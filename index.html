<script>
const DATA = [{"n": 1, "name": "The Future Me", "sections": [{"title": "一、News Report 新闻报道", "passage": ["In her last summer vacation of graduate study, Xu Jia started a two-month internship at the Chinese branch of transnational food giant Mars Inc.", "\"The field of marketing is new to me, but the experience is invaluable,\" said the Tsinghua University student who is majoring in international journalism.", "As an intern with the Dove chocolate division, Xu is engaged in all kinds of work from market analysis to research and development, which requires extensive communication with colleagues from different departments.", "\"At first it was quite challenging, because I had to learn everything from scratch,\" she said. \"But later I began taking pleasure out of working with all these interesting people.\"", "Of course, knowledge obtained in college helps. \"My major and my internship in marketing have one thing in common: both are about getting the information to the right audience,\" Xu said.", "Xu is now seeking a career in marketing and learning as much as she can."], "passageZh": ["研究生阶段最后一个暑假，徐佳在跨国食品巨头玛氏公司的中国分部开启了为期两个月的实习。", "这位主修国际新闻专业的清华学生表示：“市场营销领域对我来说很陌生，但这段经历无比宝贵。”", "作为德芙巧克力事业部的实习生，徐佳参与了从市场分析到产品研发的各类工作，这需要她和不同部门的同事进行大量沟通。", "她说：“一开始实习很有挑战性，因为所有事情我都得从零学起。但后来，和这些有趣的同事共事让我开始乐在其中。”", "当然，大学学到的知识也发挥了作用。徐佳说：“我的专业和市场营销实习有一个共同点：两者都是要把信息传递给目标受众。”", "目前徐佳正打算从事市场营销相关工作，并在尽可能多地学习相关知识。"], "questions": [{"stem": "What do we learn about Xu Jia's internship?", "opts": ["Her internship lasted for three months.", "Knowledge obtained in college is of little help to her internship.", "The internship experience is invaluable to her.", "The field of marketing is familiar to her."], "answer": 2, "letter": "C"}, {"stem": "Why was her internship challenging at the beginning?", "opts": ["Because she had to learn everything from scratch.", "Because she had to do all kinds of work.", "Because she had made no preparation for her internship.", "Because she got little help from colleagues from different departments."], "answer": 0, "letter": "A"}, {"stem": "What do her major and her internship in marketing have in common?", "opts": ["Both are about international journalism.", "Both are about getting the information to the right audience.", "Both involve research and development.", "Both require rich experience in marketing."], "answer": 1, "letter": "B"}], "questionsZh": [{"stem": "关于徐佳的实习，我们能了解到什么？", "opts": ["她的实习持续了三个月。", "大学学到的知识对她的实习几乎没有帮助。", "这段实习经历对她而言无比宝贵。", "她对市场营销领域很熟悉。"]}, {"stem": "为什么她的实习一开始充满挑战？", "opts": ["因为她必须从零开始学习所有内容。", "因为她需要完成各类工作。", "因为她完全没有为实习做准备。", "因为她几乎没得到跨部门同事的帮助。"]}, {"stem": "她的专业和市场营销实习有什么共同之处？", "opts": ["两者都属于国际新闻范畴。", "两者都是将信息传递给目标受众。", "两者都涉及研发工作。", "两者都要求丰富的市场营销经验。"]}]}, {"title": "二、Conversation 长对话", "passage": ["M: Hello, Emma, how are you doing?W: Good. I was just back from the Career Planning Centre. The job consultant gave some really good suggestions.", "M: So have you decided on your future career?W: I have decided to become a doctor.", "M: That's a good choice. Why do you choose this profession?W: People are in need of good medical service, especially those in rural areas.", "M: Indeed! Then are you willing to go to the village if needed?W: Yes, of course. I believe such a job can really fulfil myself. What about you? What is your choice of career?", "M: I want to be an agriculture officer.W: A little surprising. Most students want to be a doctor, an engineer or an administrator. What made you decide on a career as an agriculture officer?", "M: As a big agricultural country, China has a long history of farming and a huge rural population. Our economy depends largely on agriculture and much work needs to be done in this area.W: Yes, that's right. Tell me more about your plan.", "M: I now major in food science. After graduation, I plan to work in a village and help the farmers get rid of poverty and increase their income.W: It's a noble profession too. We both want to improve life for people in the rural areas.", "M: Exactly. Setting a goal brings us closer to our dreams, but choosing a career is just the first step.W: Of course. We must get equipped with the skills needed and work hard to fulfil our dreams."], "passageZh": ["男：你好，艾玛，最近怎么样？女：挺好的。我刚从职业规划中心回来，就业顾问给了我一些很不错的建议。", "男：那你想好未来的职业方向了吗？女：我已经决定要当一名医生。", "男：这是个不错的选择。你为什么选择这个职业？女：人们都需要优质的医疗服务，尤其是农村地区的人们。", "男：确实！那如果有需要，你愿意去乡村工作吗？女：当然愿意。我觉得这样的工作能真正实现自我价值。你呢？你选择了什么职业？", "男：我想当一名农业干事。女：有点意外。大多数学生都想当医生、工程师或者行政人员。是什么让你决定从事农业干事这个职业的？", "男：中国是农业大国，农耕历史悠久，农村人口众多。我国经济在很大程度上依赖农业，这个领域还有很多工作要做。女：没错。再和我说说你的计划吧。", "男：我现在主修食品科学。毕业之后，我打算去乡村工作，帮助农民脱贫增收。女：这也是一份崇高的职业。我们都想改善乡村地区人们的生活。", "男：正是如此。树立目标能让我们离梦想更近，但选择职业只是第一步。女：当然。我们必须掌握所需的技能，努力奋斗实现梦想。"], "questions": [{"stem": "What do we learn about Emma?", "opts": ["She is a job consultant at the Career Planning Centre.", "She is in need of good medical service.", "She wants to become a doctor.", "She wants to work in a big city."], "answer": 2, "letter": "C"}, {"stem": "What is the man's choice of career?", "opts": ["Engineer.", "Agriculture officer.", "Administrator.", "Doctor."], "answer": 1, "letter": "B"}, {"stem": "Why does the man plan to work in a village after graduation?", "opts": ["Because he was born in a village.", "Because he was asked to work in a village.", "Because he wants to increase his income.", "Because he wants to improve farmers' life."], "answer": 3, "letter": "D"}, {"stem": "According to the conversation, which of the following statements is NOT true about China?", "opts": ["China depends solely on agricultural development.", "China is a big agricultural country.", "China has a long history of farming.", "China has a huge rural population."], "answer": 0, "letter": "A"}], "questionsZh": [{"stem": "关于艾玛，我们能了解到什么？", "opts": ["她是职业规划中心的就业顾问。", "她需要优质的医疗服务。", "她想成为一名医生。", "她想去大城市工作。"]}, {"stem": "男士的职业选择是什么？", "opts": ["工程师", "农业干事", "行政人员", "医生"]}, {"stem": "男士为什么打算毕业后去乡村工作？", "opts": ["因为他出生在乡村。", "因为他被安排去乡村工作。", "因为他想提高自己的收入。", "因为他想改善农民的生活。"]}, {"stem": "根据对话内容，以下关于中国的表述哪一项是错误的？", "opts": ["中国完全依赖农业发展。", "中国是农业大国。", "中国农耕历史悠久。", "中国农村人口众多。"]}]}, {"title": "三、Passage 短文理解", "passage": ["Today we are going to talk about preparing for life after school; getting a job; finding a career; and earning a living. Generally speaking, you'll need to develop skills in four specific areas to achieve your dreams.", "Every day in school, you are gaining academic skills and knowledge. But it's not just about getting good grades. Challenge yourself to learn how to apply the knowledge you are taught. Apply theories and concepts to real-world problems. This will help you be more competitive upon graduation and you'll have additional options.", "Adults are expected to know other things, like life skills. These are about everyday real world survival. They include things like how to bounce back after a bad experience, how to manage money and create a family budget, and how to remain healthy through good nutrition. Life skills will give you a strong foundation for your future.", "Local employers also expect certain things of people they hire; these are called employability skills. Things teachers often ask you to do, like meeting deadlines, working in teams, and organizing projects; these are employability skills. Learning how to manage your time, creatively solve problems, and communicate appropriately will help you prepare for the world of work.", "Then, there are technical skills. These can be very industry-specific. They include the ability to apply what you have learned to working a computer, running a machine, or monitoring a patient's heart rate.", "As you prepare for your future, all of these four areas matter to you. Hope you graduate from college ready for your future career."], "passageZh": ["今天我们要聊聊如何为毕业后的生活做准备：找工作、规划职业、谋生。总的来说，要实现梦想，你需要在四个特定领域培养技能。", "在学校的每一天，你都在积累学术技能与知识。但这不仅仅是为了取得好成绩。你要挑战自己，学会应用所学的知识，把理论和概念运用到现实问题中。这会让你在毕业时更具竞争力，也会拥有更多选择。", "步入成年后，人们还需要掌握其他能力，比如生活技能。这些技能关乎现实世界的日常生存，包括如何从糟糕的经历中振作起来、如何理财和制定家庭预算、如何通过合理营养保持健康。生活技能会为你的未来打下坚实基础。", "雇主对所聘用的员工也有特定要求，这些能力被称为就业技能。老师常布置的任务，比如按时完成任务、团队协作、统筹项目，都属于就业技能。学会管理时间、创造性地解决问题、得体地沟通，能帮你为职场做好准备。", "除此之外还有技术技能，这类技能有很强的行业针对性，包括将所学知识应用于电脑操作、机器运转或监测病人心率等能力。", "在为未来做准备的过程中，这四个方面都至关重要。希望大家毕业时都能为未来的职业做好充分准备。"], "questions": [{"stem": "Which of the following is considered as a life skill?", "opts": ["Bouncing back after a bad experience.", "Organizing projects.", "Monitoring a patient's heart rate.", "Meeting deadlines."], "answer": 0, "letter": "A"}, {"stem": "Why are employability skills important?", "opts": ["Because they are very industry-specific.", "Because they cannot be gained in college.", "Because they are about everyday real world survival.", "Because they help you prepare for the world of work."], "answer": 3, "letter": "D"}, {"stem": "According to the passage, what kind of skills do you need to run a machine?", "opts": ["Academic skills.", "Life skills.", "Employability skills.", "Technical skills."], "answer": 3, "letter": "D"}], "questionsZh": [{"stem": "以下哪一项属于生活技能？", "opts": ["从糟糕的经历中振作起来", "统筹项目", "监测病人的心率", "按时完成任务"]}, {"stem": "为什么就业技能很重要？", "opts": ["因为它们有极强的行业针对性。", "因为它们无法在大学里学到。", "因为它们关乎现实世界的日常生存。", "因为它们能帮你为职场做好准备。"]}, {"stem": "根据文章内容，操作机器需要具备哪类技能？", "opts": ["学术技能", "生活技能", "就业技能", "技术技能"]}]}]}, {"n": 2, "name": "Handling Stress: Positive Psychology", "sections": [{"title": "一、News Report 新闻报道", "passage": ["The Science of Us Sleep Institute presents the good side of bad dreams. Do you find yourself tossing and turning at night affected by weird nightmares about stuff that’s been worrying? Don’t worry. Those terrible visions are actually helping your mental health.", "Research shows that the things that concern us most while we’re awake continue to mess with us when we sleep. Your unconscious brain takes your abstract fears and turns them into stories in the form of nightmares. In other words, nightmares are sort of like factories that turn your fears into memories. It actually helps distance you from your fears.", "Don’t let bad dreams keep you from going to sleep. You need bad dreams to help you process all the bad stuff in the world around you, so let’s all take a moment to thank our evil night-time visions."], "passageZh": ["美国 “自我科学睡眠研究所” 介绍了噩梦的积极作用。你是否会因为白天烦心事衍生出怪异噩梦，夜里辗转反侧？不必担心，这些可怕的梦境实际上有益于你的心理健康。", "研究表明，清醒时最让我们忧心的事，在入睡后依然会对我们产生困扰。大脑潜意识会抓取我们抽象的恐惧情绪，并将其转化为以噩梦形式呈现的故事。换句话说，噩梦就像一座加工厂，把内心的恐惧转化为记忆，帮助我们与恐惧拉开心理距离。", "不要因为害怕噩梦而不敢入睡。噩梦能帮我们消化现实生活中的负面情绪，不妨试着感谢这些夜晚里的 “负面梦境”。"], "questions": [{"stem": "What is the news report mainly about?", "opts": ["Ways to get rid of nightmares.", "Things that mess you up at night.", "The good side of bad dreams.", "The negative influence of bad dreams."], "answer": 2, "letter": "C"}, {"stem": "Which of the following is true about terrible visions?", "opts": ["They are helpful for mental health.", "They are interesting stories in the brain.", "They are useful for building a factory.", "They are creating fears."], "answer": 0, "letter": "A"}, {"stem": "Why do people have nightmares?", "opts": ["Because they are too tired at work in the daytime.", "Because there are things continuing to concern them.", "Because they have too many memories in their brain.", "Because they don’t have a good sleep environment."], "answer": 1, "letter": "B"}], "questionsZh": [{"stem": "这篇新闻报道的主旨是什么？", "opts": ["摆脱噩梦的方法", "夜间扰乱人心的事物", "噩梦的积极作用", "噩梦带来的负面影响"]}, {"stem": "关于可怕的梦境，以下表述正确的是？", "opts": ["它们对心理健康有益", "它们是大脑里有趣的故事", "它们有助于建造工厂", "它们会催生恐惧"]}, {"stem": "人为什么会做噩梦？", "opts": ["白天工作过度疲惫", "内心仍存有持续让人担忧的事", "大脑中储存了过多记忆", "睡眠环境较差"]}]}, {"title": "二、Conversation 长对话", "passage": ["W: Hey Brian, what’s up? How are your classes going?M: Not very well. No matter how much I try, I just can’t seem to get anything done.W: Why don’t you take a break now. I know some stress relief methods.M: That sounds great, if you don’t mind helping me out.W: No problem. Let’s start with a few questions. Do you think you get enough sleep at night?M: Not really. I have to work and study, so I probably only get about four or five hours’ sleep.W: What about exercise? You should try to exercise at least three days a week.M: The only exercise I get is walking back and forth to class.W: Hmm… I bet you’re eating a lot of junk food, too, right?M: Yeah, I am, but I don’t have the time to sit down and eat regular food.W: I know what you mean. So, how do you usually cope when you are stressed out?M: Well, in high school I used to run whenever I felt stressed, but now I really like listening to music.W: How do you feel after you’re done listening to music?M: I feel a little more relaxed. Sometimes it puts me to sleep.W: Maybe you should run and listen to music!"], "passageZh": ["女：嗨，布莱恩，最近怎么样？课程学习还顺利吗？男：不太顺利。无论我多努力，事情总做不完。女：你不如先休息一会儿，我知道一些缓解压力的办法。男：太好了，麻烦你帮帮我。女：没问题。我先问你几个问题。你夜间睡眠充足吗？男：并不充足。我既要打工又要学习，每晚大概只睡四到五个小时。女：那运动方面呢？你每周至少要运动三天。男：我唯一的运动量，就是往返教室走路。女：嗯…… 我猜你还经常吃垃圾食品，对吗？男：没错，但是我根本没有时间正经坐下来吃正餐。女：我懂你的处境。那你压力大的时候一般怎么调节？男：高中时压力大我就会去跑步，现在我更喜欢听音乐。女：听完音乐之后你感觉如何？男：会放松不少，有时候听着听着就睡着了。女：或许你可以边跑步边听音乐！"], "questions": [{"stem": "What are the two speakers talking about?", "opts": ["New study methods.", "Effective ways to keep fit.", "Stress relief methods.", "Striking a balance between work and life."], "answer": 2, "letter": "C"}, {"stem": "Why cannot the man get enough sleep at night?", "opts": ["He has to finish the housework.", "He has terrible nightmares.", "He lives with other people.", "He has to work and study."], "answer": 3, "letter": "D"}, {"stem": "What kind of exercise does the man do?", "opts": ["He goes to the gym every day.", "He goes running after class.", "He walks to the restaurant to work.", "He walks back and forth to class."], "answer": 3, "letter": "D"}, {"stem": "Which of the following is NOT one of the woman’s suggestions for the man?", "opts": ["Doing some reading.", "Listening to music.", "Running.", "Getting more sleep."], "answer": 0, "letter": "A"}], "questionsZh": [{"stem": "两位对话者在讨论什么内容？", "opts": ["全新学习方法", "高效健身方式", "缓解压力的方法", "平衡工作与生活"]}, {"stem": "男生夜间睡眠不足的原因是？", "opts": ["需要完成家务", "频繁做噩梦", "和他人合租居住", "同时需要打工和学习"]}, {"stem": "男生平时的运动形式是什么？", "opts": ["每天去健身房", "课后跑步", "步行去餐厅上班", "往返教室步行"]}, {"stem": "以下哪一项不属于女生给男生提出的建议？", "opts": ["阅读书籍", "听音乐", "跑步", "增加睡眠时间"]}]}, {"title": "三、Passage 短文理解", "passage": ["On Sina Weibo, Wang Bo, a mother who has been making bread as a hobby for more than 10 years, documents the different types she has produced. Many people flocked to the account and she now has some 700,000 followers.", "“Baking helps me find peace in a chaotic world, which is a comfort during stressful period,” she said. “When I’m in the kitchen, I enjoy kneading dough and seeing it slowly expand in the oven. I feel relieved that I can get away from the news, work and other things.”", "In addition to her family, she shares with neighbours the bread, cookies and cakes, helping her keep in touch. Last year, to celebrate her husband’s birthday, Wang made her first mille crepe — a type of thin pancake — with the help of her son. “We had a great mother-and-son time baking together. It was definitely the best birthday gift I ever made for my husband,” she said.", "Baking helped people ease stress. A study stated that psychologists had explored baking as a therapy tool to deal with depression and anxiety. The researchers also found that doing simple, everyday tasks such as baking made them more enthusiastic about life."], "passageZh": ["王博是一位坚持烘焙面包十余年的母亲，她在新浪微博账号记录自己制作的各类面包成品。大量网友关注了她的账号，目前她拥有约 70 万粉丝。", "她说：“烘焙能让我在纷繁杂乱的生活中寻得内心平静，是压力期最好的慰藉。身处厨房，我很享受揉面团，看着面团在烤箱里慢慢发酵膨胀。暂时远离新闻资讯、工作琐事，会让我身心放松。”", "除了家人享用之外，她还会把面包、曲奇和蛋糕分给邻居，借此维系邻里情谊。去年为给丈夫庆生，她在儿子协助下制作了人生第一款千层可丽饼。她说：“这次母子二人一起烘焙的体验特别温馨，这绝对是我送给丈夫最用心的生日礼物。”", "烘焙能够有效舒缓压力。一项研究表明，心理学家已将烘焙作为心理疗法，用于缓解抑郁与焦虑情绪。研究人员同时发现，烘焙这类简单日常手工任务，能够显著提升人们对生活的热情。"], "questions": [{"stem": "Which of the following is true about Wang’s Weibo?", "opts": ["She shares almost everything on her Weibo.", "She now has about 700,000 followers.", "She has run the account for more than 10 years.", "She only shares videos on producing breads."], "answer": 1, "letter": "B"}, {"stem": "Why does Wang share her baking with neighbours?", "opts": ["She likes to keep in touch with them.", "Her neighbours love what she bakes.", "She would like to share happiness on her husband’s birthday.", "Her neighbours could help her sell the products."], "answer": 0, "letter": "A"}, {"stem": "According to the research, how could baking help relieve one’s stress?", "opts": ["Making something together with families could relax people.", "Staying in the kitchen could make people feel relieved.", "Baking could inspire creativity.", "Doing simple tasks makes people enthusiastic about life."], "answer": 3, "letter": "D"}], "questionsZh": [{"stem": "关于王博的微博账号，表述正确的是？", "opts": ["她在微博分享生活全部内容", "她目前拥有约 70 万粉丝", "该账号已经运营 10 年以上", "她只发布制作面包的视频"]}, {"stem": "王博为什么会把烘焙成品分享给邻居？", "opts": ["她希望维系邻里之间的往来", "邻居十分喜爱她的烘焙食品", "为了在丈夫生日时分享喜悦", "邻居可以帮忙售卖烘焙产品"]}, {"stem": "根据研究内容，烘焙为什么可以缓解压力？", "opts": ["和家人共同制作食物能够放松身心", "待在厨房环境中会让人放松", "烘焙能够激发创造力", "完成简单事务能提升人们对生活的热情"]}]}]}, {"n": 3, "name": "Enjoying Sports", "sections": [{"title": "一、News Report 新闻报道", "passage": ["Researchers from a university in Manchester in the UK have said that training as part of a sports team is the best way to improve all-round fitness. The study looked at 228 athletes who studied at a sports university. There were 87 endurance athletes, such as cyclists, skiers and long-distance runners; 77 power athletes, such as sprinters and bodybuilders; and 64 team athletes who played basketball, football and volleyball.", "The researchers tested athletes on their muscle power and their ability to jump from a standing position. Researchers also tested the athletes' oxygen use during hard exercise to measure aerobic endurance. The study showed that \"endurance training for power athletes and power training for endurance athletes\" was beneficial, and team players have the best of both worlds. This is because of the different types of exercise team players do. The researchers said the key to all-round fitness is to combine building your strength with building your endurance and stamina."], "passageZh": ["英国曼彻斯特一所大学的研究人员表示，参与运动队训练是提升综合体能的最佳方式。这项研究调查了某体育院校的 228 名运动员，其中包括 87 名耐力型运动员（如自行车运动员、滑雪运动员、长跑运动员），77 名力量型运动员（如短跑运动员、健美运动员），以及 64 名篮球、足球、排球类团体项目运动员。", "研究人员测试了运动员的肌肉力量与立定跳远能力，还通过测试高强度运动中的耗氧量来评估运动员的有氧耐力。研究表明，“力量型运动员补充耐力训练、耐力型运动员补充力量训练” 均有正向效果，而团体项目运动员能同时兼顾两者优势，因为他们的训练涵盖了多种运动类型。研究人员指出，提升综合体能的核心，是将力量训练与耐力、持久力训练相结合。"], "questions": [{"stem": "What is the news report mainly about?", "opts": ["A research-based program for endurance training.", "Student-athletes at a sports university in Manchester.", "A report concerning the best training to build strength.", "A study on the best way to improve all-round fitness."], "answer": 3, "letter": "D"}, {"stem": "According to the news report, which of the following factors was NOT tested?", "opts": ["Athletes' muscle power.", "Athletes' ability to jump from a standing position.", "Athletes' speed of running.", "Athletes' oxygen use."], "answer": 2, "letter": "C"}, {"stem": "Why do team players have the best of both worlds?", "opts": ["Because they are trained by both endurance athletes and power athletes.", "Because they have both endurance training and power training.", "Because they support each other in a team.", "Because they get lots of exercise."], "answer": 1, "letter": "B"}], "questionsZh": [{"stem": "这篇新闻报道的主旨是什么？", "opts": ["一套基于研究的耐力训练项目", "曼彻斯特一所体育院校的学生运动员", "一份关于最佳增肌训练方式的报告", "一项关于提升综合体能最佳方式的研究"]}, {"stem": "根据新闻报道，以下哪一项未被纳入测试指标？", "opts": ["运动员的肌肉力量", "运动员的立定跳远能力", "运动员的跑步速度", "运动员的耗氧量"]}, {"stem": "为什么团体项目运动员能兼顾两方面优势？", "opts": ["因为他们同时接受耐力型和力量型运动员的指导", "因为他们同时进行耐力训练和力量训练", "因为他们在团队中互相支持", "因为他们的运动量很大"]}]}, {"title": "二、Conversation 长对话", "passage": ["W: So how many steps do you do in a day, Rob?M: How many steps? How should I know, Jane? It would be pretty hard to count them all.W: Oh, come on! You can track steps on your phone! I do ten thousand a day, which is the magic number to keep fit and healthy, apparently. To get more vigorous exercise, I usually get out and about, for example, around the park, at a brisk pace.M: Ok, perhaps. But why is exercise so important? It sounds pretty boring, counting steps, going to the gym, running on a machine.W: Well, when you exercise, you stimulate the body's natural repair system. Your body will actually stay younger, if you exercise.M: That sounds good.W: Exercise also lowers your risk of developing illnesses such as heart disease, cancer, and diabetes.M: Hmm. I'm getting a little bit worried now, Jane. But I don't have enough time to do ten thousand steps every day. I'm far too busy! And my job is very sedentary.W: Well, Rob, we can build walking into our busy life, for example, walk instead of driving or taking the bus, and take stairs instead of the lift.M: I could do those things.W: You could indeed. Before you know it, you'd be doing ten thousand steps because the amount of walking you do in a day builds incrementally."], "passageZh": ["女：罗布，你一天大概走多少步？男：多少步？我怎么知道啊，简？步数哪有那么好数。女：哎呀，手机就能记步数啊！我每天走一万步，据说这是保持健康的黄金步数。为了达到更高的运动强度，我平时还会出门快步走，比如绕着公园快走。男：好吧，或许是这样。但运动真的有那么重要吗？数步数、去健身房、在跑步机上跑步，听着就很无聊。女：运动能激活身体的自我修复系统，坚持运动的话，身体会更有年轻态。男：听起来还不错。女：运动还能降低心脏病、癌症、糖尿病等疾病的患病风险。男：嗯，听你这么说我都有点焦虑了。但我每天根本抽不出时间走一万步，太忙了，而且我的工作就是久坐不动的类型。女：罗布，我们可以把步行融入繁忙的日常里啊。比如用走路代替开车、坐公交，爬楼梯代替乘电梯。男：这些我倒是能做到。女：当然可以。不知不觉你就能走到一万步了，每天的步行量是会慢慢累积上来的。"], "questions": [{"stem": "What are the speakers mainly talking about?", "opts": ["The importance of counting steps.", "The importance of exercise.", "The various ways of exercise.", "The best way of keeping fit."], "answer": 1, "letter": "B"}, {"stem": "What does the woman usually do?", "opts": ["She does a thousand steps a day.", "She takes brisk walks for exercise.", "She runs on a machine in her room.", "She goes cycling around the park."], "answer": 1, "letter": "B"}, {"stem": "According to the woman, why is exercise so important?", "opts": ["Because it enables one to feel relaxed.", "Because it helps one to lose weight.", "Because it helps to prevent most diseases.", "Because it stimulates the body's natural repair system."], "answer": 3, "letter": "D"}, {"stem": "What can the man do to get more exercise?", "opts": ["Go to the gym.", "Run on a machine.", "Walk instead of driving.", "Change his sedentary job."], "answer": 2, "letter": "C"}], "questionsZh": [{"stem": "两位对话者主要在讨论什么？", "opts": ["记录步数的重要性", "运动的重要性", "运动的多种方式", "保持健康的最佳方法"]}, {"stem": "女士平时通常会做什么？", "opts": ["每天走一千步", "通过快步走进行锻炼", "在室内跑步机上跑步", "绕公园骑自行车"]}, {"stem": "在女士看来，运动为什么很重要？", "opts": ["因为它能让人放松", "因为它有助于减肥", "因为它能预防绝大多数疾病", "因为它能激活身体的自我修复系统"]}, {"stem": "男士可以通过什么方式增加运动量？", "opts": ["去健身房", "在跑步机上跑步", "用步行代替开车", "换掉久坐的工作"]}]}, {"title": "三、Passage 短文理解", "passage": ["Table tennis is one of the most popular sports in the world! But why is it played by so many people? Table tennis is a sport that can be enjoyed by individuals of any age and physical ability. Top table tennis players are some of the greatest athletes in the world, yet it is enjoyed by millions of young kids, disabled people and folks in retirement homes.", "Playing table tennis is a great way to stimulate the brain and promote quick thinking while improving eye-hand coordination.", "Table tennis is a low-injury risk sport that keeps one fit and flexible without putting severe stress on joints. Playing table tennis increases one's agility and flexibility, and most of all, their reaction time. Being a non-contact sport, you don't have to worry about those bruises and even broken bones that you can get in contact sports. Table tennis is a lifelong sport that can be played competitively right up to your eighties and beyond.", "Table tennis is also a great social sport. Play a competition once in a while and you'll be able to compete and make friends with a whole bunch of fellow table tennis enthusiasts.", "Finally, you don't have to spend a lot of money to play Ping-Pong. A basic Ping-Pong paddle can be bought for around 10 dollars."], "passageZh": ["乒乓球是全球最受欢迎的运动之一。为什么它能收获如此多爱好者？因为乒乓球是一项不分年龄、不限身体条件的运动。顶尖乒乓球运动员是世界顶级运动员群体的一员，而与此同时，数百万儿童、残障人士以及养老院的老人，也都能享受这项运动的乐趣。", "打乒乓球能活跃大脑、提升思维反应速度，同时改善手眼协调能力。", "乒乓球属于低受伤风险运动，既能锻炼身体柔韧性、保持健康，又不会给关节造成过重负担。它能提升人的敏捷度、柔韧性，最显著的是能提高反应速度。作为非对抗性运动，你完全不用担心像对抗性运动那样出现擦伤、骨折等损伤。乒乓球是一项终身运动，哪怕到八十岁以上，依然可以参与竞技。", "乒乓球还是极佳的社交运动，偶尔参加比赛，你既能切磋球技，也能结识一大批同好。", "最后，打乒乓球的成本很低，一支基础款乒乓球拍只需要大约 10 美元。"], "questions": [{"stem": "Why is table tennis played by so many people?", "opts": ["It is the greatest athletic sport.", "It is a great way to improve ear-hand coordination.", "It can be played in any place like retirement homes.", "It can be played by people of all ages and physical abilities."], "answer": 3, "letter": "D"}, {"stem": "According to the passage, which one of the following statements is true?", "opts": ["Playing table tennis involves no risk of injury.", "Playing table tennis puts severe stress on joints.", "Table tennis is a lifelong sport.", "Table tennis is a contact sport."], "answer": 2, "letter": "C"}, {"stem": "What does the speaker say about table tennis at the end of the passage?", "opts": ["There are many table tennis fans.", "Playing table tennis helps you make friends.", "It's expensive to buy Ping-Pong paddles.", "Playing table tennis doesn't cost much."], "answer": 3, "letter": "D"}], "questionsZh": [{"stem": "为什么有这么多人打乒乓球？", "opts": ["它是最顶级的竞技运动", "它是提升耳手协调能力的好方法", "它可以在养老院等任意场所进行", "它适合所有年龄、所有身体条件的人参与"]}, {"stem": "根据文章内容，以下表述正确的是？", "opts": ["打乒乓球完全没有受伤风险", "打乒乓球会给关节造成严重负担", "乒乓球是一项可以终身参与的运动", "乒乓球是一项对抗性运动"]}, {"stem": "文章结尾，作者提到了乒乓球的哪一点？", "opts": ["乒乓球爱好者数量众多", "打乒乓球有助于结交朋友", "购买乒乓球拍价格昂贵", "打乒乓球的花费不高"]}]}]}, {"n": 4, "name": "The Changing World", "sections": [{"title": "一、News Report 新闻报道", "passage": ["Little rain and high temperatures are not ideal conditions to support vegetation. However, a desert in North China’s Inner Mongolia Autonomous Region changes the view. Crops like corn, tomatoes and sunflowers are transforming more than 200 hectares of deserts into an oasis within six months.", "It’s all thanks to the new technology developed by researchers at Chongqing Jiaotong University. They developed a paste made of a substance found in plant cell walls. When it’s added to sand, it’s able to retain water, nutrients and air.", "“The costs of artificial materials and machines for transforming sand into soil is lower compared with controlled environmental agriculture,” Yang Qingguo, professor at Chongqing Jiaotong University said.", "The method could be promising for China. In three years, the country hopes to reforest 50 percent of degraded desert land that can be treated. By 2030, the United Nations is aiming to reach zero growth of desert farmland around the world."], "passageZh": ["降水稀少、气温偏高的环境本不利于植被存活。然而，中国北部内蒙古自治区的一片沙漠却打破了这一固有认知：仅用六个月时间，玉米、番茄、向日葵等农作物就让 200 多公顷荒漠变成了绿洲。", "这项成果要归功于重庆交通大学研究团队研发的新技术。科研人员从植物细胞壁中提取物质，制成了一种黏性材料；将其混入沙土后，沙土就能锁住水分、养分与空气。", "重庆交通大学教授杨庆国表示：“与设施农业相比，用这种人工材料和配套设备将沙土改良为土壤的成本更低。”", "该治沙方法在我国具备广阔的应用前景。我国计划三年内，完成 50% 可治理退化沙地的植被恢复。联合国的目标则是，到 2030 年实现全球荒漠化土地零增长。"], "questions": [{"stem": "What is the change that is taking place in a desert in North China?", "opts": ["The weather condition is improved.", "More crops are transformed.", "A part of the desert is turning into an oasis.", "The landscape of the desert is beautified."], "answer": 2, "letter": "C"}, {"stem": "What do we learn about the new technology developed by researchers?", "opts": ["It’s developed by researchers from Beijing.", "It’s an artificial material added to sand.", "It costs more than controlled environmental agriculture.", "Its future is hard to tell."], "answer": 1, "letter": "B"}, {"stem": "What is the United Nations’ goal by 2030?", "opts": ["To turn all the world’s deserts into farmlands.", "To reforest 50% of the world’s deserts.", "To tackle the problem of global warming.", "To reach zero growth of desert farmland."], "answer": 3, "letter": "D"}], "questionsZh": [{"stem": "中国北方这片沙漠正在发生怎样的变化？", "opts": ["气候条件得到改善", "更多农作物完成品种改良", "部分荒漠正在转变为绿洲", "沙漠景观得到美化"]}, {"stem": "关于研究人员研发的这项新技术，表述正确的是？", "opts": ["由北京的科研人员研发", "是一种可掺入沙土的人工材料", "成本高于设施农业", "发展前景不明朗"]}, {"stem": "联合国 2030 年的目标是什么？", "opts": ["将全球所有沙漠改造为农田", "完成全球 50% 沙漠的造林绿化", "解决全球变暖问题", "实现全球荒漠化土地零增长"]}]}, {"title": "二、Conversation 长对话", "passage": ["M: Linda, have you heard that our university is making a change to the orientation program for first-year students?W: Really? I have no idea.M: In the past, first-year students could go on a two-day hiking and camping trip together with other incoming students on the weekend before classes begin.W: So, what’s the change?M: In order to encourage more students to take advantage of the opportunity to get to know one another in an informal setting, the university will now offer a choice of activities: students will be able to either go hiking or participate in organized group games on campus. Additionally, these activities will last one day only.W: Not a bad idea. What do you think?M: Interesting, isn’t it? I wish they had made this change two years ago when we got here. This program will attract lots more people.W: Why?M: Oh, it’s a question of choice. See, not everyone likes the same things. For example, I didn’t participate two years ago just because I didn’t like sleeping in the tent.W: That’s true. You must feel you had missed out something.M: Right. Plus, the other reason this is going to work is that you don’t have to give up your whole weekend any more. You may spend one day on social activities and the other day making preparation for school days, such as buying your books, or setting up your room."], "passageZh": ["男：琳达，你听说了吗？学校要调整新生入学适应项目了。女：真的吗？我完全没听说。男：以前新生可以在开学前的周末，和其他新生一起参加为期两天的徒步露营活动。女：那改成什么样了？男：为了鼓励更多同学参与，在轻松的氛围里互相认识，学校现在提供活动选项：大家可以选徒步，也可以选参加校园集体游戏。而且所有活动都只开展一天。女：想法还不错。你觉得呢？男：挺有意思的，对吧？要是咱们入学那年就这么改就好了，这个新项目肯定能吸引更多人参加。女：为什么这么说？男：关键是有选择空间啊，不是所有人喜好都一样。比如我当年就没参加，就是因为不喜欢在帐篷里过夜。女：确实，那你肯定觉得挺遗憾的。男：是啊。而且另一个好处是，不用占用整个周末了。一天参加社交活动，另一天可以做开学准备，比如买书、收拾宿舍。"], "questions": [{"stem": "What is the change of the university’s orientation program?", "opts": ["The program will be changed from weekend to weekdays.", "The program will be offered to students of all grades.", "Students will attend activities that last for one day only.", "The university will cancel the program."], "answer": 2, "letter": "C"}, {"stem": "Why does the university make this change?", "opts": ["To encourage students to better know about each other.", "To prepare students for the new school year’s study.", "To cut the budget for students’ activities.", "To attract more students to apply for this university."], "answer": 0, "letter": "A"}, {"stem": "Why didn’t the man join the program two years ago?", "opts": ["Because he had no time.", "Because he was ill.", "Because he disliked both activities.", "Because he didn’t want to spend the night in a tent."], "answer": 3, "letter": "D"}, {"stem": "What is the man’s attitude towards this new orientation program?", "opts": ["Negative.", "Positive.", "Indifferent.", "Neutral."], "answer": 1, "letter": "B"}], "questionsZh": [{"stem": "学校的新生入学适应项目做出了什么调整？", "opts": ["活动从周末改到工作日开展", "面向全年级学生开放", "活动时长改为仅一天", "学校将取消该项目"]}, {"stem": "学校为什么要做这项调整？", "opts": ["鼓励同学们更好地互相认识", "帮助学生为新学期学习做准备", "缩减学生活动预算", "吸引更多学生报考本校"]}, {"stem": "男生两年前为什么没参加这个项目？", "opts": ["没有时间", "生病了", "两项活动他都不喜欢", "不想在帐篷里过夜"]}, {"stem": "男生对新的入学适应项目持什么态度？", "opts": ["否定的", "肯定的", "无所谓的", "中立的"]}]}, {"title": "三、Passage 短文理解", "passage": ["People are fed up working for big corporations and working to fulfil someone else’s dreams. They want to escape the cubicle, feel valued and trusted in the work they do. So they start asking questions like: Does it still make sense to work from 9 to 5 every day and 40 hours every week, a model practiced since 1914? Is it worthwhile to be in the same room with the same colleagues all our life? Or could it be replaced with a new model that gives us more freedom, more sunshine, more vitamin D and more energy? We could be working faster and more productive than ever.", "The future workforce wants work-life balance and time for their families and friends. Old status symbols like job titles and company cars aren’t attractive anymore. Instead, many workers are longing for freedom, happiness and purpose.", "With the progress in artificial intelligence, current jobs are declining. Therefore, being self-employed and building up your own business is now turning into one of the safest options for many. It’s a model that is flexible and quick and now it’s gradually outperforming and disrupting the slow world of corporations.", "But open-minded companies realize the potential of working with highly motivated and talented people and offer them enough freedom in working hours and places. This will be a rising trend in the future digital age."], "passageZh": ["人们已经厌倦了为大公司打工、为实现他人的梦想而工作。大家想要逃离格子间，在工作中获得价值感与信任感。于是人们开始质疑：自 1914 年沿用至今的朝九晚五、每周 40 小时的工作模式，如今还合理吗？一辈子和同一批同事在同一间办公室办公，真的值得吗？或许一种全新的工作模式会取而代之 —— 它能给我们更多自由、更多阳光、补充更多维生素 D，也让我们更有活力，工作效率也会比以往更高。", "未来的职场人追求工作与生活的平衡，希望有时间陪伴家人朋友。职位头衔、公司配车这类传统身份象征，早已失去吸引力。取而代之的是，越来越多职场人渴望自由、幸福感与工作的意义。", "随着人工智能的发展，传统岗位数量正在减少。因此，自主创业、经营个人事业，成了很多人眼中更稳妥的选择。这种模式灵活高效，正逐步超越并颠覆传统企业缓慢的运作模式。", "而思想开明的企业也意识到，和积极性高、能力出众的人才合作，就要在工作时间与办公地点上给予足够自由度。这将成为未来数字时代的就业新趋势。"], "questions": [{"stem": "What is the passage mainly about?", "opts": ["People’s changing attitude towards jobs.", "The competitive job market.", "Future jobs.", "People’s questions about their jobs."], "answer": 0, "letter": "A"}, {"stem": "What is the change in jobs as a result of progress in artificial intelligence?", "opts": ["No one will take corporation jobs any longer.", "More people will work for themselves.", "People will only take jobs with more flexibility.", "Artificial intelligence will outperform humans in doing jobs."], "answer": 1, "letter": "B"}, {"stem": "What will be the new trend for jobs in the future?", "opts": ["People’s income is on the rise.", "People will decide on where and how long to work.", "People will freely choose whether to work or not.", "No one will care about job titles."], "answer": 1, "letter": "B"}], "questionsZh": [{"stem": "本篇短文的主旨是什么？", "opts": ["人们对待工作的态度正在发生转变", "竞争激烈的就业市场", "未来的职业", "人们对工作产生的疑问"]}, {"stem": "人工智能发展带来的就业变化是什么？", "opts": ["再也没人愿意去企业上班", "更多人选择自主创业、为自己工作", "人们只愿意做弹性工作制的工作", "人工智能在工作表现上会超越人类"]}, {"stem": "未来的就业新趋势是什么？", "opts": ["人们的收入会持续上涨", "人们可以自主决定工作地点与工作时长", "人们可以自由选择是否工作", "没人会再在意职位头衔"]}]}]}, {"n": 5, "name": "Love's Magic Moment", "sections": [{"title": "一、News Report 新闻报道", "passage": ["An online college course on how to deal with love and relationships has become a hit among students. The unconventional elective course, called Psychology of Love and Relationship, is open to the public and has attracted over 1.2 million clicks. At least nine universities in China offer courses like this one on relationships, and they’re getting more popular.", "Unlike most classes, Psychology of Love and Relationship doesn’t emphasize theory, and instead turns its focus on practical experience. Students are encouraged to speak out about their previous experiences in relationships, and to discuss the types of relationships they encountered at school, such as love at first sight, unrequited love, and long-distance love.", "“What I hope most is that students can hold a healthy attitude towards relationships and understand the real concept of love after studying the course,” said Duan Xinxing, the psychology professor who developed the course alongside her team."], "passageZh": ["一门讲解如何处理爱情与亲密关系的大学线上课程在学生群体中大受欢迎。这门别具特色的选修课名为《爱情与关系心理学》，面向全网开放，点击量突破 120 万次。国内至少九所高校开设了同类情感课程，这类课程正愈发火爆。", "和绝大多数课程不同，《爱情与关系心理学》并不侧重理论知识，核心聚焦真实实践体验。课程鼓励学生主动分享自身过往的情感经历，讨论校园里常见的恋爱类型：一见钟情、单相思、异地恋等。", "研发这门课程的心理学教授段新星表示：“我最希望同学们上完这门课后，能够树立健康的婚恋观，理解爱情真正的内涵。”"], "questions": [{"stem": "What is the name of the online course?", "opts": ["How to Deal with Love and Relationship.", "Psychology of Love and Relationship.", "The Real Concept of Love.", "Theory in Love and Dating."], "answer": 1, "letter": "B"}, {"stem": "Which of the following is NOT true about the online course?", "opts": ["It is an elective course.", "It is open to the public.", "It is quite popular among students.", "It is a theory-based course."], "answer": 3, "letter": "D"}, {"stem": "What is the most important aim of the online course according to the professor?", "opts": ["To learn different types of relationships.", "To learn the techniques of handling relationship challenges.", "To help students develop a healthy attitude towards relationships.", "To encourage students to speak out their previous experiences in relationships."], "answer": 2, "letter": "C"}], "questionsZh": [{"stem": "这门线上课程的名称是什么？", "opts": ["如何处理爱情与亲密关系", "爱情与关系心理学", "爱情的真正内涵", "恋爱与约会理论"]}, {"stem": "关于这门线上课程，表述错误的一项是？", "opts": ["它是一门选修课", "它面向全体公众开放", "在学生中人气很高", "它以理论学习为核心"]}, {"stem": "在授课教授看来，这门课程最核心的目标是？", "opts": ["学习不同类型的恋爱关系", "学习化解情感矛盾的技巧", "帮助学生树立健康的亲密关系观念", "鼓励学生倾诉过往恋爱经历"]}]}, {"title": "二、Conversation 长对话", "passage": ["W: Dan, why are you looking so upset?M: Oh Lizzy, it’s all over! She broke up with me on Valentine's Day! She said I wasn’t the one.W: Cheer up Dan, cheer up. It’s not your fault. Let me take a wild guess… love at first sight, was it?M: Well… yes. What’s your point?W: Well, it’s not your fault, Dan. A lot of what we believe about love today — for example, the idea that two people will live happily ever after — comes from the romantic ideals.M: But, everyone loves a bit of romance!W: Well, that’s true. However, it’s one thing to enjoy romance, but it can be dangerous to judge your relationship against romantic ideals.M: Now that you mention it, I guess I do have an idealized or perfect version of a relationship.W: Yes, and I don’t blame you on that. You see, we grow up hearing these romantic stories, which leads us to develop an idea of what a relationship is meant to be… and then we get disappointed by the real thing.M: Does that mean true love doesn’t exist?W: No. It just means that all relationships must be worked on and that perfection is impossible. But we should never give up trying.M: You’re right! She wasn’t the one for me! I need to find my next Juliet. She’ll be just perfect!W: Oh Dan. You haven’t learnt anything! You’re just a hopeless romantic."], "passageZh": ["女：丹，你怎么看起来这么低落？男：莉齐，我们彻底结束了！她在情人节和我提了分手，说我不是她的良人。女：振作一点丹，这不是你的问题。我大胆猜一下，你们是一见钟情在一起的对吗？男：没错。你想说什么？女：这真的不能怪你。我们如今对爱情的很多固有认知 —— 比如 “两个人从此幸福共度一生” 这类想法，都来源于浪漫主义幻想。男：但所有人都向往浪漫啊！女：确实如此。享受浪漫本身无可厚非，但如果用理想化的浪漫标准去要求真实感情，就很容易出现问题。男：经你这么一说，我确实总向往一段极致完美的恋爱关系。女：我理解你。我们从小接触大量浪漫故事，内心会不自觉构建一段感情 “应有的模样”，现实相处达不到预期，就很容易失望。男：那这么说，世间不存在真爱吗？女：并非如此。所有感情都需要用心经营，绝对的完美本就不存在，但我们依然值得为爱努力。男：你说得对！她本来就不适合我！我要去找我的下一位朱丽叶，下一段感情一定会无比完美。女：唉，丹，你完全没有听进去。你就是个无可救药的浪漫主义者。"], "questions": [{"stem": "What is the conversation mainly about?", "opts": ["How to break up with someone.", "How to find true love.", "How a romantic view of love may affect relationships.", "How to succeed in dating."], "answer": 2, "letter": "C"}, {"stem": "How does the man tend to view relationships?", "opts": ["He doesn’t believe in true love.", "He thinks perfect relationship is impossible.", "He believes that good relationships take hard work.", "He has an idealized or perfect version of relationships."], "answer": 3, "letter": "D"}, {"stem": "What is the woman’s attitude towards romance?", "opts": ["Sympathetic.", "Positive.", "Critical.", "Indifferent."], "answer": 2, "letter": "C"}, {"stem": "Why does the woman say \"you’re just a hopeless romantic\"?", "opts": ["Because the man wants to get back with his ex-girlfriend.", "Because the man believes his next girlfriend will be just perfect.", "Because the man doesn’t agree with what the woman says about romance.", "Because the man would never give up trying."], "answer": 1, "letter": "B"}], "questionsZh": [{"stem": "这段对话的核心主题是？", "opts": ["如何和他人分手", "如何寻找真爱", "理想化的浪漫爱情观会对亲密关系产生哪些影响", "如何在约会中取得成功"]}, {"stem": "男生看待恋爱关系的特点是？", "opts": ["他不相信真爱存在", "他认为完美的恋情不可能存在", "他认为优质感情需要用心经营", "他内心向往理想化、绝对完美的恋爱关系"]}, {"stem": "女生对于浪漫主义的态度是？", "opts": ["同情的", "支持的", "批判、审慎的", "漠不关心的"]}, {"stem": "女生为什么评价男生是 “无可救药的浪漫主义者”？", "opts": ["因为男生想要和前女友复合", "因为男生依旧坚信下一任女友会是绝对完美的", "因为男生不认同女生对于浪漫的观点", "因为男生永远不会放弃追求爱情"]}]}, {"title": "三、Passage 短文理解", "passage": ["The traditional wedding rhyme goes: Something old, something new, something borrowed and something blue. It describes the four objects a bride should have with her on her wedding day for good luck, and brides have been following this custom for centuries. But where does it come from and what do these wedding traditions mean?", "This particular phrase and tradition likely comes from England and it first appeared in a magazine in 1871. What do each of those things symbolize? Let's break it down. Back in the day, having \"something old\" meant to protect any future children the couple might have from the evil eye. But these days it represents continuity and many couples use this as a chance to wear a piece of jewelry belonging to an older relative.", "\"Something new\" is a symbol of a bride’s new life ahead of her and a sign of the new couple’s future together. It can be anything, like the wedding dress, jewelry or shoes that the bride bought for herself or a gift from someone else.\"Something borrowed\" is for borrowed happiness. It was meant to bring the couple good luck by borrowing something from a happily married friend or family member.\"Something blue\" comes from the idea that the color blue represents love, purity and loyalty, which are all important elements of a happy marriage."], "passageZh": ["西方经典婚礼童谣：旧物、新物、借物、蓝物。它指代新娘在婚礼当天需要随身携带四样物件，以此祈求好运，这项习俗已经流传数百年。这项传统起源于哪里？每样物品又分别代表什么含义？", "这套说法与习俗最早起源于英国，于 1871 年首次刊登在杂志上。我们逐一解析寓意：在古代，“旧物” 寓意庇护新人未来的孩子远离邪眼诅咒；现代语境下，它代表生命的延续，很多新娘会佩戴家中长辈传承的首饰作为旧物。", "“新物” 象征新娘全新的人生篇章，代表新婚夫妇携手开启未来。品类不限，可以是新娘自行购置的婚纱、首饰、鞋子，或是他人赠送的礼物。“借物” 寓意借来幸福：向婚姻美满的亲友借来随身物件，为新人祈福。“蓝物” 的内涵源于蓝色的象征意义：代表爱情、忠贞与纯粹，三者都是幸福婚姻不可或缺的内核。"], "questions": [{"stem": "What is this passage mainly about?", "opts": ["The origin of a traditional wedding rhyme.", "Wedding traditions from around the world.", "What a bride must have with her on her wedding day.", "How to perform a wedding."], "answer": 2, "letter": "C"}, {"stem": "Where does this particular tradition come from?", "opts": ["United States.", "Australia.", "England.", "Spain."], "answer": 2, "letter": "C"}, {"stem": "What do we learn about \"something new\"?", "opts": ["It must be a new wedding dress the groom bought for the bride.", "It must be new jewelry given by friends.", "It must be new shoes the bride bought for herself.", "It can be anything the bride bought for herself or a gift from someone else."], "answer": 3, "letter": "D"}], "questionsZh": [{"stem": "本篇短文的主旨是？", "opts": ["一则经典婚礼童谣的起源与内涵", "全球各地的婚礼习俗", "新娘婚礼必备的随身物品", "婚礼的举办流程"]}, {"stem": "这项传统习俗起源于哪个国家？", "opts": ["美国", "澳大利亚", "英国", "西班牙"]}, {"stem": "关于 “新物”，表述正确的是？", "opts": ["必须是新郎赠予新娘的全新婚纱", "必须是朋友赠送的全新首饰", "必须是新娘自行购买的新鞋", "可以是新娘自购物品，也可以是他人赠送的礼物"]}]}]}, {"n": 6, "name": "A Charitable Heart", "sections": [{"title": "一、News Report 新闻报道", "passage": ["Fifteen years ago, Karibeeran and his wife Choodamani both considered suicide after their three children died. The three — a son and two daughters — were aged 5, 9 and 12 at the time. They were among the estimated 230,000 victims of a tsunami in the Indian Ocean.", "“We could see many children standing on the road, without shelter, without parents,” Choodamani told reporters with the Reuters news agency. “I thought, I lost my children, why don’t I take these children and give them shelter.” At first, the couple brought four orphans home. Soon after, they turned their home into an orphanage. Within days, the number of orphans under their care expanded from 4 to 36. They called it Nambikkai. The name means “hope” in the Tamil language. Since then, the couple have had a newfound purpose in life."], "passageZh": ["15 年前，卡里比兰和妻子丘达玛尼在三个孩子离世后，都曾产生过自杀的念头。三个孩子分别是一个儿子和两个女儿，当时年仅 5 岁、9 岁和 12 岁。他们都是印度洋海啸的遇难者，这场海啸预计共造成 23 万人丧生。", "丘达玛尼在接受路透社采访时说：“我们看到很多孩子站在路边，无家可归，失去了父母。我想，我已经失去了自己的孩子，不如收留这些孩子，给他们一个容身之所。” 起初，这对夫妇只接回了 4 名孤儿。不久后，他们干脆把自己的家改成了孤儿院。短短几天内，收留的孤儿就从 4 名增加到 36 名。他们给孤儿院取名为 “南比凯”，在泰米尔语中意为 “希望”。从那以后，这对夫妇找到了人生新的意义。"], "questions": [{"stem": "Why did Karibeeran and his wife consider suicide?", "opts": ["They lost their shelter.", "They lost their parents.", "Their children died in a car accident.", "Their children died in a tsunami."], "answer": 3, "letter": "D"}, {"stem": "What do we learn about the tsunami?", "opts": ["It claimed 23,000 lives.", "It made many children orphans.", "It occurred in the Pacific Ocean.", "It happened fifty years ago."], "answer": 1, "letter": "B"}, {"stem": "What is the news report mainly about?", "opts": ["The cause of a tsunami.", "The life of a Chinese couple.", "How an orphanage came into being.", "How an orphan lost his parents."], "answer": 2, "letter": "C"}], "questionsZh": [{"stem": "卡里比兰夫妇为什么曾想过自杀？", "opts": ["他们失去了住所", "他们失去了父母", "他们的孩子死于车祸", "他们的孩子在海啸中遇难"]}, {"stem": "关于这场海啸，我们能了解到什么？", "opts": ["造成 2.3 万人丧生", "导致很多孩子成为孤儿", "发生在太平洋海域", "发生在五十年前"]}, {"stem": "这篇新闻报道的主旨是什么？", "opts": ["海啸的成因", "一对中国夫妇的生活", "一所孤儿院的由来", "一名孤儿如何失去父母"]}]}, {"title": "二、Conversation 长对话", "passage": ["W: Are you ready for Christmas?M: No, I haven’t even started. I’ve done zero shopping.W: Well, you’d better get going. Christmas is round the corner.M: I have to tell you that I’m one of those people who really get stressed by the Christmas rush. I wish I could sleep through Christmas.W: Really? Why?M: The shopping, the crowds, and especially the Christmas bills, which takes me till April to pay off.W: How about the music, the food, the parties and all the cheers? Think about your kids. How excited they are when they get the dream gift from Santa Clause!M: Yeah, you said it.W: You used to love Christmas when you were a kid, didn’t you?M: I guess so. I don’t remember.W: I know you did. You know, maybe Christmas is for kids, but you can still enjoy it through the eyes of your children.M: Well, kids enjoy it because they don’t have to do all the shopping and pay all the bills.W: Maybe that’s true. But you know as well as I do, that Christmas is more than shopping and stress. It’s about what’s in your heart and how you can make others happy.M: You’re right. You’re absolutely right. I’m going to try harder to be nice to people and try to keep the true spirit of Christmas in my heart."], "passageZh": ["女：圣诞节的准备工作做得怎么样了？男：完全没开始，一样东西都没买。女：那你得抓紧了，圣诞节马上就到了。男：说实话，一到圣诞季忙前忙后我就特别焦虑，真希望直接睡过圣诞节算了。女：是吗？为什么啊？男：要采购、人挤人，尤其是圣诞账单，我得还到四月份才能还清。女：那圣诞音乐、美食、派对，还有热闹的氛围呢？想想你的孩子们，收到圣诞老人送的心仪礼物时多开心啊。男：也是，你说得对。女：你小时候不也很喜欢圣诞节吗？男：好像是吧，记不清了。女：你肯定喜欢的。虽说圣诞节是孩子们的节日，但你也可以借着孩子的视角重新感受节日的快乐啊。男：孩子开心是因为他们不用采购、不用付账单啊。女：这话也没错。但你我都清楚，圣诞节不只有采购和压力，更重要的是内心的温度，以及给他人带去快乐的心意。男：你说得对，太有道理了。我会试着更友善地对待身边的人，把圣诞节真正的意义记在心里。"], "questions": [{"stem": "What does the woman try to do in the conversation?", "opts": ["To stop the man from throwing a Christmas party.", "To persuade the man to shop with his kids.", "To convince the man Christmas is worth celebrating.", "To prevent the man from spending too much on shopping."], "answer": 2, "letter": "C"}, {"stem": "When does the conversation take place?", "opts": ["On Christmas Eve.", "Not long before Christmas.", "On New Year’s Eve.", "Not long after Christmas."], "answer": 1, "letter": "B"}, {"stem": "Why does the man get stressed out by the Christmas rush?", "opts": ["Because of the music.", "Because of the food.", "Because of the parties.", "Because of the shopping."], "answer": 3, "letter": "D"}, {"stem": "What will the man most probably do after the conversation?", "opts": ["Prepare for Christmas.", "Pay off Christmas bills.", "Try to work harder.", "Limit his wife’s expense."], "answer": 0, "letter": "A"}], "questionsZh": [{"stem": "对话中女士想要做什么？", "opts": ["阻止男士举办圣诞派对", "劝说男士和孩子一起购物", "说服男士圣诞节值得庆祝", "不让男士在购物上花太多钱"]}, {"stem": "对话发生在什么时候？", "opts": ["平安夜当天", "圣诞节前不久", "新年前夜", "圣诞节刚过不久"]}, {"stem": "男士为什么会因圣诞季的忙碌感到焦虑？", "opts": ["因为音乐", "因为食物", "因为派对", "因为采购事宜"]}, {"stem": "对话结束后，男士最有可能做什么？", "opts": ["为圣诞节做准备", "还清圣诞账单", "更努力工作", "限制妻子的开销"]}]}, {"title": "三、Passage 短文理解", "passage": ["Students from colleges and universities nationwide are providing free tutoring services to children of medical staff who are busy combating “COVID-19” in an effort to help ease their worries about their youngsters’ studies during this critical period.", "About 10 universities are organizing students to participate in the voluntary work. More than 50 students from Hebei Normal University are serving as one-on-one online tutors for children of medical staff in Hebei or those who are fighting on the frontline in Hubei province, the epicentre of the outbreak. The volunteers will first consult medical staff and their children about specific learning needs and then make plans for each to tutor lessons or help solve problems during their study via online video chats. Others volunteers won’t be tasked with directly teaching course lessons. They will tutor and help the young students deal with psychological issues they may have without their mothers or fathers being around.", "Some medical staff who accepted the help said they were really very busy and didn’t have time to help their children with homework.", "The volunteers were enthusiastic and feel honoured about the “job”. “I feel honoured when I know I can make my own contribution during the joint fight against the virus,” said Zhou Miaolan, a Hebei Normal University student. Zhou is tutoring a pupil, the child of a doctor surnamed Wang in Hebei General Hospital. Zhou said that the experience also helps her gain some knowledge about teaching."], "passageZh": ["全国多所高校的大学生为奋战在抗疫一线的医护人员子女提供免费课业辅导，帮助医护人员在特殊时期打消对孩子学业的顾虑。", "约 10 所高校组织学生参与这项志愿工作。河北师范大学的 50 余名学生，为河北本地以及奔赴疫情中心湖北一线的医护人员子女提供一对一在线辅导。志愿者会先和医护人员及孩子沟通具体学习需求，再制定专属方案，通过线上视频辅导功课、答疑解惑。还有一部分志愿者不负责课程教学，而是帮助孩子们疏导父母不在身边时可能出现的心理问题。", "接受帮扶的医护人员表示，自己工作太忙，根本没时间辅导孩子写作业。", "志愿者们都满怀热情，也为这份 “工作” 感到自豪。河北师范大学学生周妙兰说：“能为共同抗疫贡献自己的一份力量，我感到很光荣。” 她正在辅导河北省总医院一位王姓医生的孩子，是名小学生。周妙兰表示，这段经历也让她收获了不少教学相关的知识。"], "questions": [{"stem": "How do college students help ease medical staff’s worries about their children’s studies?", "opts": ["By providing free tutoring services.", "By helping with their children’s homework.", "By accompanying them during the critical period.", "By solving their psychological problems."], "answer": 0, "letter": "A"}, {"stem": "Which of the following statements is true according to the passage?", "opts": ["The one-on-one online tutoring service is provided to medical staff.", "The task for all volunteers is to provide online course lessons.", "About 50 universities are organizing students to participate in the voluntary work.", "The voluntary work involves dealing with the children’s psychological problems."], "answer": 3, "letter": "D"}, {"stem": "What do we learn about Zhou Miaolan?", "opts": ["She is from Hebei University.", "She is the child of a doctor whose family name is Wang.", "She is tutoring a middle school student.", "She felt honoured about the voluntary work."], "answer": 3, "letter": "D"}], "questionsZh": [{"stem": "大学生如何帮助医护人员打消对孩子学业的担忧？", "opts": ["提供免费课业辅导服务", "帮孩子辅导作业", "在特殊时期陪伴孩子", "解决孩子的心理问题"]}, {"stem": "根据文章内容，以下表述正确的是？", "opts": ["一对一在线辅导是面向医护人员本人提供的", "所有志愿者的任务都是讲授线上课程", "约 50 所高校组织学生参与志愿工作", "志愿工作包含疏导孩子的心理问题"]}, {"stem": "关于周妙兰，我们能了解到什么？", "opts": ["她来自河北大学", "她是一位王姓医生的孩子", "她在辅导一名中学生", "她为参与志愿工作感到光荣"]}]}]}, {"n": 7, "name": "Glocalization", "sections": [{"title": "一、News Report 新闻报道", "passage": ["Six years on, the China-proposed Belt and Road Initiative or BRI has delivered tangible benefits to all participating countries and regions. Its core concepts have been written into documents of the United Nations, G20 and APEC.", "From 2013 to 2018, the goods trade between China and countries along the Belt and Road totalled 1.3 trillion. In 82 overseas economic and trade cooperation zones built by China in 24 BRI countries, more than $2 billion in taxes has been paid to host countries, and about 300,000 local jobs have been created. Meanwhile, China has signed agreements with 24 BRI countries on mutual recognition of higher education degrees.", "The Belt and Road Initiative will promote a more sustainable and inclusive version of globalization."], "passageZh": ["中国提出的 “一带一路” 倡议提出六年来，已为所有参与国家和地区带来了实实在在的收益。其核心理念已被写入联合国、二十国集团和亚太经合组织的相关文件中。", "2013 年至 2018 年，中国与 “一带一路” 沿线国家的货物贸易总额达 6 万亿美元；2018 年当年贸易额达到 1.3 万亿美元。中国在 24 个共建国家设立了 82 个境外经贸合作区，为东道国缴纳税收超 20 亿美元，创造约 30 万个当地就业岗位。同时，中国已与 24 个共建国家签署高等教育学历互认协议。", "“一带一路” 倡议将推动全球化朝着更加可持续、更具包容性的方向发展。"], "questions": [{"stem": "What is the news report mainly about?", "opts": ["Concepts of the Belt and Road Initiative.", "Benefits of the Belt and Road Initiative.", "Buildings along the Belt and Road.", "Countries along the Belt and Road."], "answer": 1, "letter": "B"}, {"stem": "What is the total value of the goods trade between China and BRI countries in 2018?", "opts": ["$6 trillion", "$1.6 trillion", "$3 trillion", "$1.3 trillion"], "answer": 3, "letter": "D"}, {"stem": "According to the news report, which one of the following statements about BRI is true?", "opts": ["The Belt and Road Initiative was proposed in the year of 2013.", "The Belt and Road Initiative was proposed by the UN, G20 and APEC.", "The Belt and Road Initiative is mainly about economic cooperation.", "The Belt and Road Initiative has 82 participating countries and regions."], "answer": 0, "letter": "A"}], "questionsZh": [{"stem": "这篇新闻报道的主旨是什么？", "opts": ["“一带一路” 倡议的理念", "“一带一路” 倡议带来的益处", "“一带一路” 沿线的建筑", "“一带一路” 沿线国家"]}, {"stem": "2018 年中国与 “一带一路” 国家的货物贸易总额是多少？", "opts": ["6 万亿美元", "1.6 万亿美元", "3 万亿美元", "1.3 万亿美元"]}, {"stem": "根据新闻报道，以下关于 “一带一路” 的表述正确的是？", "opts": ["“一带一路” 倡议于 2013 年提出", "“一带一路” 倡议由联合国、二十国集团和亚太经合组织提出", "“一带一路” 倡议主要围绕经济合作展开", "“一带一路” 有 82 个参与国家和地区"]}]}, {"title": "二、Conversation 长对话", "passage": ["M: It’s time for your bedtime story!W: Great!M: Once upon a time, several routes led from China to Central Asia to Europe. It was called the Silk Road. People would put things on camels and cross the desert to trade with other people. And then later, ships travelled from China through Southeast Asia to Africa, and they’d bring things back to China like giraffes.W: Is that how the Beijing Zoo got giraffes?M: No. That was a long time ago. A few years ago, China’s president Xi Jinping proposed making new routes like the old routes. But even bigger. It’s called the Belt and Road Initiative. More stuff can move around the world more easily, and people can travel more easily, and build things countries need.W: So, it’s just about moving stuff around?M: Countries make deals about buying and selling things. And they visit each other’s countries and even go to each other’s schools. And they want to increase globalization.W: Globalization … what’s that?M: That’s where people from different parts of the world cooperate more. They buy and sell things to each other. And they visit and even live in each other’s countries.W: But why does globalization happen?M: It’s good for people. We lead happier lives when we cooperate."], "passageZh": ["男：该听睡前故事啦！女：太棒啦！男：很久以前，有几条商路从中国出发，经中亚延伸到欧洲，叫作丝绸之路。人们把货物放在骆驼背上，穿越沙漠和其他人做交易。后来，船只从中国出发，经东南亚抵达非洲，还把长颈鹿这样的物产带回中国。女：北京动物园的长颈鹿就是这么来的吗？男：不是的，那都是很久很久以前的事了。几年前，中国国家主席习近平提出，要修建类似古商路的新路线，而且规模更大，这就是 “一带一路” 倡议。有了它，全球的货物流通更便捷，人们出行更方便，还能修建各国需要的基础设施。女：所以，这就只是运货吗？男：各国会达成贸易协定，互相往来，甚至互派留学生，目的是推动全球化发展。女：全球化…… 是什么呀？男：就是世界各地的人们加强合作，互相买卖商品，互相往来，甚至在彼此的国家生活。女：那为什么要发展全球化呢？男：这对大家都有好处，合作能让我们的生活更幸福。"], "questions": [{"stem": "What are the two speakers talking about?", "opts": ["Routes leading from China to Central Asia to Europe.", "Animals in the Beijing Zoo from all over the world.", "An initiative to promote global cooperation.", "Countries on the ancient Silk Road."], "answer": 2, "letter": "C"}, {"stem": "According to the man, who proposed the new routes?", "opts": ["China’s president Xi Jinping.", "Some ancient people.", "Countries on the ancient routes.", "Countries on the new routes."], "answer": 0, "letter": "A"}, {"stem": "What can we infer from the conversation?", "opts": ["China starts trading with other countries recently.", "Cooperation among countries promotes globalization.", "Globalization is about moving things around the world.", "The Belt and Road Initiative is exactly like the Silk Road."], "answer": 1, "letter": "B"}, {"stem": "What is the relationship between the two speakers?", "opts": ["Professor and student.", "Husband and wife.", "Father and daughter.", "Neighbours."], "answer": 2, "letter": "C"}], "questionsZh": [{"stem": "两位对话者在谈论什么？", "opts": ["从中国经中亚到欧洲的商路", "北京动物园里来自世界各地的动物", "一项推动全球合作的倡议", "古丝绸之路上的国家"]}, {"stem": "在男士看来，是谁提出了新商路的构想？", "opts": ["中国国家主席习近平", "一些古人", "古商路沿线的国家", "新商路沿线的国家"]}, {"stem": "从对话中我们可以推断出什么？", "opts": ["中国最近才开始和其他国家开展贸易", "国家间的合作推动了全球化", "全球化就是在全球范围内运输货物", "“一带一路” 倡议和丝绸之路完全一样"]}, {"stem": "两位说话者是什么关系？", "opts": ["教授与学生", "夫妻", "父亲与女儿", "邻居"]}]}, {"title": "三、Passage 短文理解", "passage": ["Localization is the process of adapting a product to a specific target market. There are many localization challenges. It requires consideration of multiple cultural factors.", "McDonald’s, for example, operates over 30,000 restaurants in 100 countries. Its worldwide expansion is an example of globalization. By design, the corporation creates a menu adaptable to various local tastes and customs. McDonald’s has opened a meat-free restaurant in India, a country in which much of the population does not eat beef or pork. In this case, McDonald’s has maintained its global brand identity but tailored its products and services for local markets.", "When creating its film Inside Out, Pixar modified its animation to accommodate multiple versions of a scene where a character points to and reads a sign. In the Arabic version of the film, the character moves from right to left, rather than the left-to-right direction the animation takes in the English version of the film.", "Apple’s Siri virtual assistant represents a product that has been successfully localized. When users ask Siri for the weather report or directions to a specific address, Siri can provide the answer in Celsius or Fahrenheit, or kilometres or miles, respectively. Users can even select their preferred accent for Siri’s voice.", "These cases exemplify localization. Whenever you anticipate expanding a product to multiple national or even regional markets, you need to consider localization. Planning for these processes before the project begins will help you design products that include and satisfy users of all regions, cultures, and languages."], "passageZh": ["本地化，是指让产品适配特定目标市场的调整过程。本地化工作面临诸多挑战，需要综合考量多重文化因素。", "以麦当劳为例，它在全球 100 个国家开设了 3 万多家门店，其全球扩张是全球化的典型案例。在品牌设计上，麦当劳会推出适配各地口味与习俗的菜单。在多数民众不食用牛肉、猪肉的印度，麦当劳开设了纯素门店。这一案例中，麦当劳既保留了全球品牌定位，又针对本土市场调整了产品与服务。", "皮克斯在制作电影《头脑特工队》时，修改了一处角色指着路牌阅读的动画画面，以适配不同版本。在阿拉伯语版本中，角色的动作方向是从右到左，和英语版本从左到右的动画方向相反。", "苹果的虚拟语音助手 Siri，是产品本地化的成功范例。用户向 Siri 询问天气、导航路线时，Siri 可以分别用摄氏度 / 华氏度、公里 / 英里来反馈结果，用户甚至可以选择 Siri 的语音口音。", "这些案例都诠释了本地化的内涵。当企业计划将产品推广到多个国家，甚至不同区域市场时，就必须考虑本地化。在项目启动前做好本地化规划，能让产品覆盖并满足不同地区、不同文化、不同语言用户的需求。"], "questions": [{"stem": "What is mentioned as a challenge during the process of localization?", "opts": ["Various cultural factors.", "Worldwide company expansion.", "Multiple target markets.", "Global brand maintenance."], "answer": 0, "letter": "A"}, {"stem": "When do companies need to consider localization?", "opts": ["When a project begins.", "When the company is designing a product.", "When the company wants to satisfy its customers.", "When the company faces many national or regional markets."], "answer": 3, "letter": "D"}, {"stem": "What is the passage mainly about?", "opts": ["Examples of localization.", "Process of localization.", "Concepts of localization.", "Challenges of localization."], "answer": 0, "letter": "A"}], "questionsZh": [{"stem": "文中提到，本地化过程中的一项挑战是什么？", "opts": ["多元的文化因素", "企业的全球扩张", "多样的目标市场", "全球品牌的维护"]}, {"stem": "企业什么时候需要考虑本地化？", "opts": ["项目启动时", "企业设计产品时", "企业想要满足消费者需求时", "企业面向多个国家或区域市场时"]}, {"stem": "这篇短文的主旨是什么？", "opts": ["本地化的实际案例", "本地化的流程", "本地化的概念", "本地化面临的挑战"]}]}]}, {"n": 8, "name": "The Beauty of Cultural Diversity", "sections": [{"title": "一、News Report 新闻报道", "passage": ["An intangible cultural heritage fair started in the southern Chinese city of Guangzhou from Friday. The fair includes exhibitions, shows, lectures and forums to present the vivid practice of intangible cultural heritage protection and development in China. It is among China’s continuous efforts to build and enhance intangible cultural heritage protection.Since 2006, China has celebrated Cultural Heritage Day on the second Saturday of June. In 2017, it was renamed Cultural and Natural Heritage Day. More than 3,200 activities have been scheduled across China to celebrate this year’s Cultural and Natural Heritage Day, which falls on June 8. Aiming to raise the public’s cultural confidence and awareness, an educational television show that invites experts to tell stories about the inheritance of intangible cultural heritage, was broadcast on Friday evening. An exhibition on Guqin, the Chinese zither, a Kunqu Opera performance and a photo exhibition are also scheduled."], "passageZh": ["一场非物质文化遗产博览会于周五在中国南方城市广州开幕。本次博览会包含展览、展演、讲座与论坛，全方位展示我国非物质文化遗产保护与活化发展的鲜活实践，也是我国持续加强非遗保护工作的重要举措之一。", "自 2006 年起，我国在每年六月第二个星期六设立 “文化遗产日”；2017 年正式更名为 “文化和自然遗产日”。今年 6 月 8 日遗产日，全国共策划举办超 3200 场主题活动。一档邀请专家讲述非遗传承故事的科普教育电视节目于周五晚间播出，旨在提升大众文化自信与文化保护意识。同期还安排了古琴专题展、昆曲演出以及主题摄影展。"], "questions": [{"stem": "Which of the following is NOT included in the intangible cultural heritage fair?", "opts": ["Exhibition", "Movie", "Lecture", "Forum"], "answer": 1, "letter": "B"}, {"stem": "When was the Cultural Heritage Day first celebrated in China?", "opts": ["In 2016", "In 2006", "In 2017", "In 2007"], "answer": 1, "letter": "B"}, {"stem": "What do we learn about the educational television show?", "opts": ["More than 3,200 activities were scheduled.", "Its aim is to raise the public’s cultural confidence and awareness.", "Celebrities were invited to tell stories.", "It was broadcast on Saturday evening."], "answer": 1, "letter": "B"}], "questionsZh": [{"stem": "以下哪项没有包含在本次非遗博览会中？", "opts": ["展览", "电影", "讲座", "论坛"]}, {"stem": "我国首次举办文化遗产日是在哪一年？", "opts": ["2016 年", "2006 年", "2017 年", "2007 年"]}, {"stem": "关于这档科普电视节目，表述正确的是？", "opts": ["共筹备了 3200 余场配套活动", "节目旨在提升大众的文化自信与文化保护意识", "邀请知名明星进行故事分享", "在周六晚间播出"]}]}, {"title": "二、Conversation 长对话", "passage": ["M: Why do you have this strange vase, Jana?W: That’s the first vase I made in my glassblowing class.M: You’re taking a glassblowing class? Why do you take it?W: Not for credit. I’m taking it because I’m interested in culture and traditional crafts. Maybe it’s because of my dad’s influence.M: Your dad?W: Yes, my dad is very much interested in culture and traditional crafts.M: Oh, cool. And glassblowing is a traditional craft? Tell me more about it.W: Yes, it is a traditional craft in many countries. And it is the practice of shaping a mass of glass. The glass has been softened by heat, and the blower blows air into it through a tube.M: That’s really interesting. Why do you learn it? Only because of your dad?W: Not really. I want to help to preserve the cultural heritage of the country. You know some traditional crafts are in danger of being lost and only old people know about them. I feel this is a real responsibility to learn it and even to pass it on to the next generation.M: That’s really cool. I have never learned a traditional craft.W: You should try! You could always come to my glassblowing class."], "passageZh": ["男：雅娜，你这个造型奇特的花瓶是哪来的？女：这是我在吹制玻璃工艺课上亲手做的第一个花瓶。男：你在选修吹制玻璃课？为什么想学这个？女：不为修学分。我本身就对各类文化与传统手工艺很感兴趣，也有我父亲的影响因素。男：你的父亲？女：没错，我父亲十分热爱各类传统文化与传统手艺。男：听起来很棒，吹制玻璃属于传统手工艺吗？能和我讲讲吗？女：它在多国都是经典传统工艺。这项技艺是对玻璃原料塑形：玻璃经过高温软化后，匠人通过长管向内部吹气成型。男：很有意思。你学习这项技艺仅仅是因为父亲吗？女：不完全是。我希望为国家文化遗产保护尽一份力。不少传统手工艺正濒临失传，只有老一辈人还掌握技法。我认为学习技艺、将其代代传承是我们的责任。男：你的想法特别棒，我还从未接触过任何传统手工艺。女：你可以尝试一下，随时可以来我的吹制玻璃课堂体验。"], "questions": [{"stem": "Why does the woman take the glassblowing class?", "opts": ["She takes the glassblowing class for credits.", "She takes the glassblowing class out of interest.", "It is a tradition for her to take this class.", "Her dad asked her to take the class."], "answer": 1, "letter": "B"}, {"stem": "Which of the following statements about glassblowing is NOT true?", "opts": ["Glassblowing is a traditional craft.", "Glassblowing is the practice of cutting a mass of glass.", "The glass has been softened by heat.", "The blower blows air into it through a tube."], "answer": 1, "letter": "B"}, {"stem": "Why does the woman help to preserve the cultural heritage?", "opts": ["Because some traditional crafts are in danger of being lost.", "Because even some old people don’t know about it.", "Because nobody learns it.", "Because nobody shoulders the responsibility of passing it on."], "answer": 0, "letter": "A"}, {"stem": "What can we infer from the conversation?", "opts": ["Glassblowing class can give the woman extra credit.", "Glassblowing is very interesting to many people.", "There are a lot of traditional crafts in many countries.", "Glassblowing is a traditional craft and deserves to be passed on."], "answer": 3, "letter": "D"}], "questionsZh": [{"stem": "女生为什么参加吹制玻璃课程？", "opts": ["为了修课程学分", "出于个人兴趣爱好", "学习这门手艺是她家的传统", "是父亲强制要求她学习"]}, {"stem": "关于吹制玻璃，错误的一项是？", "opts": ["吹制玻璃属于传统手工艺", "该工艺的核心是切割玻璃原料", "玻璃会经过高温软化处理", "匠人通过长管向玻璃内部吹气"]}, {"stem": "女生主动参与文化遗产保护的原因是？", "opts": ["许多传统手工艺濒临失传", "就连老年人也不了解这项技艺", "完全没有人学习这项手艺", "没有任何人愿意承担传承的责任"]}, {"stem": "从对话中我们可以推断出？", "opts": ["吹制玻璃课可以获取额外学分", "吹制玻璃对绝大多数人极具吸引力", "全球各国都拥有大量传统手工艺", "吹制玻璃是值得代代延续的传统手工艺"]}]}, {"title": "三、Passage 短文理解", "passage": ["There are perhaps 45,000 different English surnames, but most have their origins as one of these types.The first type: occupational. Occupational names identified people based on their job or position in society. Calling a man “Thomas Carpenter” indicated that he worked with wood for a living, while someone named Hunter indicated that he once lived by hunting. Other occupational names include Baker, Cook, Farmer, Fisher, Judge, Smith, and there are many more.The second type: describing a personal characteristic. These surnames may have described a person’s size, like Short, Long; colouring, like Black, White; or other character traits, like Strong, Swift. Someone named Peacock might have been very proud.The third type: from an English place name. A surname may have pointed to where a person was born, lived, worked, or owned land. It might be from the name of a house, farm, town, or county. Some examples are Hamilton, Hampshire, Sutton.The fourth type: from a geographical feature of the landscape. Some examples are Bridge, Camp, Fields, Forest, Hill, Lake, Stone, Wood. Famous author Margaret Atwood is probably from someone who lived “at the wood”.You probably also have met surnames like Benson, Harrison, Jackson, Robinson, Simpson, and Wilson. Those are usually from a male given name. For example, the surname Benson means “the son of Ben”."], "passageZh": ["英语姓氏总计约 45000 种，绝大多数可以归纳为四类起源。第一类：职业类姓氏。这类姓氏直接对应持有者的社会职业。例如姓氏 Carpenter（木匠）代表此人以木工为生；Hunter（猎人）代表此人依靠打猎谋生。同类职业姓氏还有面包师、厨师、农夫、渔夫、法官、铁匠等。第二类：个人外貌与性格特征类。可以形容身材（Short 矮、Long 高）、肤色发色（Black、White），或是性格特质（Strong 强壮、Swift 敏捷）。姓氏 Peacock（孔雀）一般用来形容人骄傲自负。第三类：英国地名衍生姓氏。用以标识出生地、居住地、工作地或是私产所在地，来源可以是宅邸、农场、村镇、郡县名，例如汉密尔顿、汉普郡、萨顿。第四类：自然地貌衍生姓氏，如桥、营地、田野、森林、山丘、湖泊、石头、树林。知名作家玛格丽特・阿特伍德的姓氏，先祖大概率居住在林地旁。还有本森、哈里森、杰克逊、罗宾逊、辛普森、威尔逊这类姓氏，源自男性本名后缀，Benson 的含义就是 “本的儿子”。"], "questions": [{"stem": "What is the passage mainly about?", "opts": ["Different English characters.", "Different occupations.", "Different personal characteristics.", "Different origins of English surnames."], "answer": 3, "letter": "D"}, {"stem": "What did the surname Carpenter indicate?", "opts": ["It indicated that he worked with wood for a living.", "It indicated that he worked with car for a living.", "It indicated that he worked with painting for a living.", "It indicated that he worked with hunting for a living."], "answer": 0, "letter": "A"}, {"stem": "What characteristic might the surname Peacock indicate?", "opts": ["Black", "Strong", "Swift", "Proud"], "answer": 3, "letter": "D"}], "questionsZh": [{"stem": "本篇短文的核心主题是什么？", "opts": ["英语人群的不同性格特质", "各类社会职业", "多样的个人特征", "英语姓氏的各类起源"]}, {"stem": "姓氏 Carpenter 代表什么含义？", "opts": ["此人以木工活为生", "此人以汽修工作为生", "此人以绘画工作为生", "此人以狩猎为生"]}, {"stem": "Peacock 这一姓氏对应什么性格特点？", "opts": ["黝黑", "强壮", "行动敏捷", "骄傲自负"]}]}]}];
const LS_UNIT='ls-listening-unit', LS_FS='ls-listening-fs';
function el(tag,cls,html){const e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e;}

function renderNav(){
  const nav=document.getElementById('nav'); nav.innerHTML='';
  DATA.forEach(u=>{
    const b=el('button',null,'U'+u.n); b.dataset.n=u.n;
    b.onclick=()=>renderUnit(u.n);
    nav.appendChild(b);
  });
}

function renderUnit(n){
  const u=DATA.find(x=>x.n===n)||DATA[0];
  localStorage.setItem(LS_UNIT,u.n);
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active', +b.dataset.n===u.n));
  document.getElementById('unitHead').innerHTML=
    '<h1>Unit '+u.n+' · '+u.name+'</h1><p>共 '+u.sections.length+' 个部分，点击按钮切换显示</p>';
  const wrap=document.getElementById('cards'); wrap.innerHTML='';
  u.sections.forEach(s=>{
    const card=el('section','card');
    const ch=el('div','card-head');
    ch.appendChild(el('span','t',s.title));
    ch.appendChild(el('div','spacer'));
    const bAll=el('button','btn','显示所有选项');
    bAll.onclick=()=>{ bAll.classList.toggle('on'); card.classList.toggle('show-all-options'); };
    const bPas=el('button','btn green','显示原文与译文');
    bPas.onclick=()=>{ bPas.classList.toggle('on'); card.querySelector('.passage-area').classList.toggle('open'); };
    ch.appendChild(bAll); ch.appendChild(bPas);
    card.appendChild(ch);

    const body=el('div','card-body');
    const grid=el('div','qgrid');

    // 列头：左英文 右中文
    const head=el('div','qhead');
    head.appendChild(el('div','en','English Questions<span class="tag">EN</span>'));
    head.appendChild(el('div','zh','题目与选项翻译<span class="tag">中</span>'));
    grid.appendChild(head);

    const maxQ=Math.max(s.questions.length, s.questionsZh.length);
    for(let i=0;i<maxQ;i++){
      const row=el('div','qrow');
      // 左：英文
      const en=el('div','qcell q-eng');
      const q=s.questions[i];
      if(q){
        const stem=el('div','qstem');
        stem.appendChild(el('span','num',String(i+1)));
        stem.appendChild(el('span','txt',q.stem));
        en.appendChild(stem);
        const ul=el('ul','opts');
        ['A','B','C','D'].forEach((L,idx)=>{
          const li=el('li'); if(idx===q.answer)li.classList.add('correct');
          li.appendChild(el('span','L',L)); li.appendChild(el('span','C',q.opts[idx]||''));
          ul.appendChild(li);
        });
        en.appendChild(ul);
      }
      row.appendChild(en);
      // 右：中文
      const zh=el('div','qcell zh');
      const qz=s.questionsZh[i];
      if(qz){
        const stem=el('div','qstem zh');
        stem.appendChild(el('span','num',String(i+1)));
        stem.appendChild(el('span','txt',qz.stem));
        zh.appendChild(stem);
        const ul=el('ul','opts');
        const ans=q?q.answer:-1;
        ['A','B','C','D'].forEach((L,idx)=>{
          const li=el('li');
          if(idx===ans) li.classList.add('correct');
          li.appendChild(el('span','L',L)); li.appendChild(el('span','C',qz.opts[idx]||''));
          ul.appendChild(li);
        });
        zh.appendChild(ul);
      }
      row.appendChild(zh);
      grid.appendChild(row);
    }
    body.appendChild(grid);

    // 原文区
    const pa=el('div','passage-area');
    const enP=el('div','pcol en');
    enP.appendChild(el('h4','','听力原文<span class="tag">EN</span>'));
    (s.passage.length?s.passage:['（无）']).forEach(p=>enP.appendChild(el('p',null,p)));
    const zhP=el('div','pcol zh');
    zhP.appendChild(el('h4','','原文中文翻译<span class="tag">中</span>'));
    (s.passageZh.length?s.passageZh:['（无）']).forEach(p=>zhP.appendChild(el('p',null,p)));
    pa.appendChild(enP); pa.appendChild(zhP);
    body.appendChild(pa);

    card.appendChild(body);
    wrap.appendChild(card);
  });
}

const QUIZ_N=6;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function flattenSections(){const arr=[];DATA.forEach(u=>u.sections.forEach(s=>arr.push({unitN:u.n,unitName:u.name,title:s.title,questions:s.questions})));return arr;}
function mk(tag,cls,text){const e=document.createElement(tag);if(cls)e.className=cls;if(text!=null)e.textContent=text;return e;}
let quizState=null;
function sectionKind(title){if(title.includes('News Report'))return 'news';if(title.includes('Conversation'))return 'conversation';return 'passage';}
function startQuiz(){
  const all=flattenSections().map(s=>({unitN:s.unitN,unitName:s.unitName,title:s.title,questions:s.questions,kind:sectionKind(s.title)}));
  const pick=(k,n)=>shuffle(all.filter(s=>s.kind===k)).slice(0,n);
  const pool=[].concat(pick('news',2),pick('conversation',2),pick('passage',2));
  const PER=5, items=[];
  pool.forEach(sec=>sec.questions.forEach(q=>{
    const opts=q.opts.map((t,i)=>({text:t,correct:i===q.answer}));
    shuffle(opts);
    items.push({unitN:sec.unitN,unitName:sec.unitName,secTitle:sec.title,stem:q.stem,opts,answered:false,picked:-1});
  }));
  quizState={items,score:0,answered:0,total:items.length,per:PER};
  renderQuiz();
  const ov=document.getElementById('quiz');ov.classList.add('show');ov.scrollTop=0;
  document.body.style.overflow='hidden';
}
function renderQuiz(){
  const st=quizState,wrap=document.getElementById('quiz');wrap.innerHTML='';
  const inner=mk('div','quiz-inner');
  const top=mk('div','quiz-top');
  top.appendChild(mk('h2',null,'随机答题'));
  const b1=mk('div','qstat-box');
  b1.innerHTML='<span class="quiz-stat">已答 <b>'+st.answered+'</b> / '+st.total+'</span><span class="qbar done"><i id="qDoneBar" style="width:'+(st.total?Math.round(st.answered/st.total*100):0)+'%"></i></span>';
  top.appendChild(b1);
  const b2=mk('div','qstat-box');
  b2.innerHTML='<span class="quiz-stat score">得分 <b>'+(st.score*st.per)+'</b> / 100</span><span class="qbar score"><i id="qScoreBar" style="width:'+(st.score*st.per)+'%"></i></span>';
  top.appendChild(b2);
  top.appendChild(mk('div','quiz-hint','每题 '+st.per+' 分 · 满分 100'));
  top.appendChild(mk('div','spacer'));
  const restart=mk('button','btn','换一组'); restart.onclick=startQuiz;
  const close=mk('button','btn','关闭'); close.onclick=closeQuiz;
  top.appendChild(restart);top.appendChild(close);
  inner.appendChild(top);
  let lastKey=null,card=null,idx=0;
  st.items.forEach(it=>{
    const key=it.unitN+'|'+it.secTitle;
    if(key!==lastKey){card=mk('div','quiz-card');card.appendChild(mk('h3',null,'Unit '+it.unitN+' · '+it.secTitle));card.appendChild(mk('div','sub',it.unitName));inner.appendChild(card);lastKey=key;idx=0;}
    const item=mk('div','qitem'); if(it.answered)item.classList.add('answered');
    const stem=mk('div','stem');
    stem.appendChild(mk('span','n',String(idx+1)));
    const stxt=mk('span',null); stxt.textContent=it.stem; stem.appendChild(stxt);
    item.appendChild(stem);
    const ul=mk('div','qopts');
    it.opts.forEach((o,oi)=>{
      const b=mk('button','qopt');
      if(it.answered){ if(o.correct)b.classList.add('right'); else if(oi===it.picked)b.classList.add('wrong'); }
      b.appendChild(mk('span','L',String.fromCharCode(65+oi)));
      const tx=mk('span',null); tx.textContent=o.text; b.appendChild(tx);
      if(!it.answered) b.onclick=()=>pickOption(it,oi,item);
      ul.appendChild(b);
    });
    item.appendChild(ul);
    card.appendChild(item);
    idx++;
  });
  if(st.answered===st.total) inner.appendChild(buildDone(st));
  wrap.appendChild(inner);
}
function buildDone(st){
  const d=mk('div','quiz-done');
  const pts=st.score*st.per, pct=Math.round(st.score/st.total*100);
  d.innerHTML='<h2>答题完成</h2><div class="big">'+pts+' / 100</div><p>答对 '+st.score+' / '+st.total+' 题 · 正确率 '+pct+'%</p>';
  return d;
}
function pickOption(it,oi,item){
  if(it.answered)return;
  it.answered=true;it.picked=oi;
  if(it.opts[oi].correct)quizState.score++;
  quizState.answered++;
  item.classList.add('answered');
  item.querySelectorAll('.qopt').forEach((b,bi)=>{
    b.onclick=null;
    if(it.opts[bi].correct)b.classList.add('right');
    else if(bi===oi)b.classList.add('wrong');
  });
  const stats=document.querySelectorAll('#quiz .quiz-top .quiz-stat');
  if(stats[0])stats[0].innerHTML='已答 <b>'+quizState.answered+'</b> / '+quizState.total;
  if(stats[1])stats[1].innerHTML='得分 <b>'+(quizState.score*quizState.per)+'</b> / 100';
  const db=document.getElementById('qDoneBar'), sb=document.getElementById('qScoreBar');
  if(db)db.style.width=(quizState.total?Math.round(quizState.answered/quizState.total*100):0)+'%';
  if(sb)sb.style.width=(quizState.score*quizState.per)+'%';
  if(quizState.answered===quizState.total){
    setTimeout(()=>{
      const inner=document.querySelector('#quiz .quiz-inner');
      if(inner&&!document.querySelector('#quiz .quiz-done')){
        const d=buildDone(quizState);inner.appendChild(d);
        d.scrollIntoView({behavior:'smooth',block:'center'});
      }
    },180);
  }
}
function closeQuiz(){document.getElementById('quiz').classList.remove('show');document.body.style.overflow='';}
document.getElementById('quizBtn').onclick=startQuiz;
</script>
