<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>视听说A2听力</title>
<style>
:root{
  --bg:#f4f2ed; --card:#fff; --ink:#1f2937; --mute:#6b7280; --line:#ececec;
  --accent:#2563eb; --ok:#10b981; --ok-bg:#ecfdf5; --ok-ink:#047857;
  --fs-q:19px; --fs-p:17px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--ink);
  font-family:system-ui,-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.85; -webkit-font-smoothing:antialiased;
}
.topbar{
  position:sticky; top:0; z-index:60;
  background:rgba(255,255,255,.9); backdrop-filter:blur(14px) saturate(140%);
  border-bottom:1px solid var(--line);
  box-shadow:0 1px 12px -8px rgba(0,0,0,.18);
  padding:11px 18px;
}
.topbar-inner{max-width:1180px;margin:0 auto;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.brand{
  font-size:17px;font-weight:800;letter-spacing:.3px;margin-right:8px;
  padding-left:12px;border-left:4px solid var(--accent);line-height:1.25;
}
.brand small{display:block;font-size:12px;font-weight:500;color:var(--mute);letter-spacing:0;margin-top:1px}
.nav{display:flex;gap:6px;flex-wrap:wrap}
.nav button{
  border:1px solid transparent;background:#f1f1ee;color:var(--ink);
  border-radius:99px;padding:8px 16px;font-size:14px;font-weight:700;cursor:pointer;
  transition:all .18s ease;
}
.nav button:hover{background:#e7ecff;color:var(--accent)}
.nav button.active{
  background:var(--accent);color:#fff;
  box-shadow:0 4px 12px -4px rgba(37,99,235,.5);transform:translateY(-1px);
}
.spacer{flex:1}
.size-ctrl{display:flex;gap:6px;align-items:center}
.size-ctrl button{
  width:36px;height:36px;border:1px solid #e2e2e2;background:#fff;border-radius:50%;
  font-size:15px;font-weight:700;cursor:pointer;color:var(--ink);
  display:inline-flex;align-items:center;justify-content:center;transition:all .18s ease;
}
.size-ctrl button:hover{border-color:var(--accent);color:var(--accent);background:#eef2ff;transform:translateY(-1px)}
.watermark{flex:1;display:flex;align-items:center;justify-content:center;gap:12px;min-width:0;padding:0 10px}
.wm-line{height:1px;flex:1;max-width:72px;background:linear-gradient(90deg,transparent,#d2d2d2,transparent)}
.wm-text{
  font-family:"Georgia","Times New Roman",serif;font-style:italic;font-size:18px;font-weight:700;letter-spacing:1.5px;
  background:linear-gradient(90deg,#7c3aed,#2563eb,#10b981);
  -webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 1px 6px rgba(37,99,235,.22));opacity:.82;white-space:nowrap;
}
@media(max-width:760px){.wm-line{display:none}.wm-text{font-size:15px;letter-spacing:1px}}

main{max-width:1180px;margin:0 auto;padding:24px 18px 90px}
.unit-head{margin:6px 0 22px}
.unit-head h1{font-size:30px;margin:0 0 4px}
.unit-head p{margin:0;color:var(--mute);font-size:14px}

.card{
  background:var(--card);border-radius:16px;margin-bottom:22px;
  box-shadow:0 1px 3px rgba(0,0,0,.04),0 10px 26px -18px rgba(0,0,0,.16);overflow:hidden;
}
.card-head{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:16px 22px;border-bottom:1px solid var(--line)}
.card-head .t{font-size:17px;font-weight:700}
.card-head .spacer{flex:1}
.btn{
  border:1px solid #e2e2e2;background:#fff;color:var(--ink);
  border-radius:10px;padding:10px 18px;font-size:14px;font-weight:600;cursor:pointer;
  transition:all .18s ease;user-select:none;box-shadow:0 1px 2px rgba(0,0,0,.03);
}
.btn:hover{border-color:var(--accent);color:var(--accent);background:#eef2ff;transform:translateY(-1px)}
.btn.on{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 4px 12px -4px rgba(37,99,235,.45)}
.btn.green.on{background:var(--ok);border-color:var(--ok);color:#fff;box-shadow:0 4px 12px -4px rgba(16,185,129,.45)}
.card-body{padding:18px 22px}

/* 题区：逐题成行，左英文右中文，顶部对齐 */
.qgrid{}
.qhead,.qrow{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start}
.qhead{
  font-size:13px;font-weight:700;color:var(--mute);border-bottom:2px solid var(--line);
  padding-bottom:6px;margin-bottom:14px;letter-spacing:.5px;
}
.qhead .tag{display:inline-block;padding:1px 8px;border-radius:99px;font-size:11px;margin-left:6px}
.qhead .en .tag{background:#eef2ff;color:var(--accent)}
.qhead .zh .tag{background:#fef3c7;color:#b45309}
.qrow{margin-bottom:22px}
.qrow:last-child{margin-bottom:0}

.qcell{}
.qstem{font-size:var(--fs-q);font-weight:600;margin:0 0 8px;display:flex;gap:8px}
.qstem .num{
  flex:0 0 auto;min-width:24px;height:24px;padding:0 6px;border-radius:99px;
  background:#eef2ff;color:var(--accent);font-size:12px;font-weight:700;
  display:inline-flex;align-items:center;justify-content:center;margin-top:4px;
}
.qstem.zh .num{background:#fef3c7;color:#b45309}
.qstem .txt{flex:1}

.opts{list-style:none;margin:0;padding:0}
.opts li{font-size:var(--fs-q);padding:6px 10px;border-radius:8px;margin:2px 0;display:flex;gap:8px;transition:opacity .2s ease,color .2s ease}
.opts li .L{flex:0 0 auto;min-width:22px;font-weight:700;color:var(--mute)}
.opts li .C{flex:1}

/* 英文 cell：非正确选项透明占位，切换时不改变布局 */
.q-eng .opts li{opacity:0;pointer-events:none}
.q-eng .opts li.correct{
  opacity:1;background:var(--ok-bg);color:var(--ok-ink);font-weight:600;
  border-left:3px solid var(--ok);padding-left:8px;
}
.q-eng .opts li.correct .L{color:var(--ok-ink)}
/* 开启"显示所有选项"（卡片级） */
.show-all-options .q-eng .opts li{opacity:1;pointer-events:auto}
.show-all-options .q-eng .opts li:not(.correct){color:var(--mute)}
/* 中文 cell 正确选项高亮（琥珀） */
.qcell.zh .opts li.correct{background:#fef3c7;color:#b45309;font-weight:600;border-left:3px solid #f59e0b;padding-left:8px}
.qcell.zh .opts li.correct .L{color:#b45309}

/* 原文区 */
.passage-area{display:none;margin-top:18px;border-top:1px dashed var(--line);padding-top:16px}
.passage-area.open{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.pcol h4{font-size:13px;font-weight:700;color:var(--mute);margin:0 0 8px;letter-spacing:.5px}
.pcol h4 .tag{display:inline-block;padding:1px 8px;border-radius:99px;font-size:11px;background:#eef2ff;color:var(--accent);margin-left:6px}
.pcol.zh h4 .tag{background:#fef3c7;color:#b45309}
.pcol p{font-size:var(--fs-p);margin:0 0 10px;text-align:justify}

.footer{text-align:center;color:var(--mute);font-size:12px;margin-top:30px}
@media(max-width:760px){
  .qhead,.qrow,.passage-area.open{grid-template-columns:1fr}
  .qhead{display:none}
}

/* 答题系统 */
.quiz-btn{margin-left:6px;background:linear-gradient(90deg,#7c3aed,#2563eb);color:#fff;border-color:transparent;font-weight:700}
.quiz-btn:hover{filter:brightness(1.08);transform:translateY(-1px);color:#fff;background:linear-gradient(90deg,#7c3aed,#2563eb)}
.quiz-overlay{position:fixed;inset:0;z-index:100;background:var(--bg);overflow:auto;display:none}
.quiz-overlay.show{display:block}
.quiz-inner{max-width:880px;margin:0 auto;padding:20px 18px 100px}
.quiz-top{
  position:sticky;top:0;z-index:5;background:rgba(244,242,237,.93);backdrop-filter:blur(10px);
  padding:12px 0 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;flex-wrap:wrap;
}
.quiz-top h2{font-size:20px;margin:0}
.quiz-stat{font-size:14px;font-weight:600;color:var(--mute)}
.quiz-stat b{color:var(--accent)}
.quiz-stat.score b{color:var(--ok)}
.quiz-hint{font-size:12px;color:var(--mute);font-weight:500}
.qstat-box{display:flex;flex-direction:column;gap:5px;min-width:140px}
.qbar{height:7px;border-radius:99px;background:#e5e7eb;overflow:hidden}
.qbar>i{display:block;height:100%;width:0;border-radius:99px;transition:width .35s ease}
.qbar.done>i{background:linear-gradient(90deg,#7c3aed,#2563eb)}
.qbar.score>i{background:linear-gradient(90deg,#10b981,#22c55e)}
.quiz-top .spacer{flex:1}
.quiz-card{background:var(--card);border-radius:16px;margin:18px 0;padding:18px 22px;box-shadow:0 1px 3px rgba(0,0,0,.04),0 10px 26px -18px rgba(0,0,0,.16)}
.quiz-card h3{font-size:16px;margin:0 0 4px;color:var(--ink)}
.quiz-card .sub{font-size:12px;color:var(--mute);margin:0 0 14px}
.qitem{margin-bottom:22px}
.qitem:last-child{margin-bottom:0}
.qitem .stem{font-size:var(--fs-q);font-weight:600;margin:0 0 10px;display:flex;gap:8px}
.qitem .stem .n{flex:0 0 auto;min-width:24px;height:24px;padding:0 6px;border-radius:99px;background:#eef2ff;color:var(--accent);font-size:12px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;margin-top:4px}
.qopts{list-style:none;margin:0;padding:0;display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:620px){.qopts{grid-template-columns:1fr}}
.qopt{
  border:1px solid #e2e2e2;background:#fff;color:var(--ink);border-radius:10px;
  padding:10px 12px;font-size:var(--fs-q);text-align:left;cursor:pointer;transition:all .15s;
  display:flex;gap:8px;font-family:inherit;line-height:1.5;
}
.qopt:hover{border-color:var(--accent);background:#eef2ff}
.qitem.answered .qopt{cursor:default}
.qopt.right{background:var(--ok-bg);border-color:var(--ok);color:var(--ok-ink);font-weight:600}
.qopt.right .L{color:var(--ok-ink)}
.qopt.wrong{background:#fef2f2;border-color:#ef4444;color:#b91c1c;font-weight:600}
.qopt.wrong .L{color:#b91c1c}
.qitem.answered .qopt:not(.right):not(.wrong){opacity:.5}
.quiz-done{text-align:center;padding:36px 20px}
.quiz-done h2{font-size:26px;margin:0 0 6px}
.quiz-done .big{font-size:46px;font-weight:800;color:var(--ok);margin:8px 0}
.quiz-done p{color:var(--mute);font-size:15px;margin:0 0 18px}
</style>
</head>
